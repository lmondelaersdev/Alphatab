<body>

<div id="startup-screen" class="overlay">

</div>

<div id="app">
    <div id="header">
        <div style="font-weight: 800; color: var(--accent);">AlphaTab Pro</div>
        <span id="mode-pill" class="pill">SYNTH</span>
        <div id="song-info" style="flex:1; font-size: 0.8rem; opacity: 0.7; padding-left: 5px;">Load a .gp file…</div>
        <button class="btn" style="padding: 8px 12px;" onclick="document.getElementById('file-input').click()">📁 Open</button>
        <!-- No accept filter: iOS has no UTI for .gp and will grey everything out -->
        <input type="file" id="file-input" style="display:none" />
    </div>
    <div id="main"><div id="at-element"></div></div>
    <div id="footer">

    </div>

<div id="debug-container"><pre id="debug-log">Engine offline.</pre></div>

<script>
    const log = (m) => {
        const l = document.getElementById('debug-log');
        l.innerText += "\n> " + m;
        l.scrollTop = l.scrollHeight;
    };
    const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';

    let api, audioCtx;
    let externalAudio;          // the <audio> tag that plays the WAV
    let currentWavUrl = null;
    let positionTimer = 0;
    let handlerWired = false;   // we only attach the IExternalMediaHandler once
    let externalMode = false;   // flips true once a backing track is bound
    let syncOffsetMs = 0;       // manual cursor↔audio drift correction
    let barNotesMap = null;     // Map<masterBarIndex, Set<"string-fret">>
    let fbDotMap = new Map();   // Map<"string-fret", SVGCircleElement>
    let lastPaintedBarIdx = -2;

    // ─────────────────────────────────────────────────────────────────────
    // FRETBOARD VISUALIZATION
    // ─────────────────────────────────────────────────────────────────────
    const FB = {
        strings: 6, frets: 18,
        fretWidth: 48, stringGap: 13,
        padTop: 14, padBottom: 18, padLeft: 28, padRight: 16,
        nutWidth: 7
    };

    function buildFretboardSVG() {
        const w = FB.padLeft + FB.nutWidth + FB.frets * FB.fretWidth + FB.padRight;
        const h = FB.padTop + (FB.strings - 1) * FB.stringGap + FB.padBottom;
        const boardTop = FB.padTop - 7;
        const boardBot = FB.padTop + (FB.strings - 1) * FB.stringGap + 7;
        const stringX0 = FB.padLeft - 6;
        const stringX1 = w - FB.padRight;

        const parts = [];
        parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`);

        // Wood
        parts.push(`<rect x="${FB.padLeft}" y="${boardTop}" width="${FB.nutWidth + FB.frets * FB.fretWidth}" height="${boardBot - boardTop}" fill="#3a2618"/>`);
        // Nut
        parts.push(`<rect x="${FB.padLeft}" y="${boardTop}" width="${FB.nutWidth}" height="${boardBot - boardTop}" fill="#e8d8b8"/>`);

        // Frets
        for (let f = 1; f <= FB.frets; f++) {
            const x = FB.padLeft + FB.nutWidth + f * FB.fretWidth;
            parts.push(`<line x1="${x}" y1="${boardTop}" x2="${x}" y2="${boardBot}" stroke="#a89070" stroke-width="1.5"/>`);
        }

        // Position markers
        const midY = FB.padTop + ((FB.strings - 1) * FB.stringGap) / 2;
        for (const fr of [3, 5, 7, 9, 15, 17]) {
            if (fr > FB.frets) continue;
            const x = FB.padLeft + FB.nutWidth + (fr - 0.5) * FB.fretWidth;
            parts.push(`<circle cx="${x}" cy="${midY}" r="3.5" fill="#5a3e28"/>`);
        }
        for (const fr of [12]) {
            if (fr > FB.frets) continue;
            const x = FB.padLeft + FB.nutWidth + (fr - 0.5) * FB.fretWidth;
            parts.push(`<circle cx="${x}" cy="${FB.padTop + 1.2 * FB.stringGap}" r="3.5" fill="#5a3e28"/>`);
            parts.push(`<circle cx="${x}" cy="${FB.padTop + 3.8 * FB.stringGap}" r="3.5" fill="#5a3e28"/>`);
        }

        // Fret numbers
        for (let f = 1; f <= FB.frets; f++) {
            const x = FB.padLeft + FB.nutWidth + (f - 0.5) * FB.fretWidth;
            parts.push(`<text x="${x}" y="${boardBot + 11}" text-anchor="middle" font-size="9" fill="#7a6450" font-family="monospace">${f}</text>`);
        }

        // Strings (over frets)
        for (let s = 1; s <= FB.strings; s++) {
            const y = FB.padTop + (s - 1) * FB.stringGap;
            const thickness = 0.8 + (s - 1) * 0.25;
            parts.push(`<line x1="${stringX0}" y1="${y}" x2="${stringX1}" y2="${y}" stroke="#d8d8d8" stroke-width="${thickness}"/>`);
        }

        // Dots — one per string×fret intersection (incl. open at fret 0)
        for (let s = 1; s <= FB.strings; s++) {
            const y = FB.padTop + (s - 1) * FB.stringGap;
            // Open string (left of nut)
            parts.push(`<circle class="fb-dot" id="fb-dot-${s}-0" cx="${FB.padLeft - 14}" cy="${y}" r="5.5" fill="transparent" stroke="transparent" stroke-width="1.5"/>`);
            for (let f = 1; f <= FB.frets; f++) {
                const x = FB.padLeft + FB.nutWidth + (f - 0.5) * FB.fretWidth;
                parts.push(`<circle class="fb-dot" id="fb-dot-${s}-${f}" cx="${x}" cy="${y}" r="5.5" fill="transparent" stroke="transparent" stroke-width="1.5"/>`);
            }
        }

        parts.push('</svg>');
        return parts.join('');
    }

    function initFretboard() {
        document.getElementById('fretboard').innerHTML = buildFretboardSVG();
        fbDotMap.clear();
        for (let s = 1; s <= FB.strings; s++) {
            for (let f = 0; f <= FB.frets; f++) {
                const el = document.getElementById(`fb-dot-${s}-${f}`);
                if (el) fbDotMap.set(`${s}-${f}`, el);
            }
        }
    }

    function buildBarNotesMap(score) {
        const map = new Map();
        for (const track of score.tracks || []) {
            for (const staff of track.staves || []) {
                for (const bar of staff.bars || []) {
                    const idx = bar.masterBar?.index ?? bar.index ?? -1;
                    if (idx < 0) continue;
                    if (!map.has(idx)) map.set(idx, new Set());
                    const set = map.get(idx);
                    for (const voice of bar.voices || []) {
                        for (const beat of voice.beats || []) {
                            for (const note of beat.notes || []) {
                                const s = note.string, f = note.fret;
                                if (s > 0 && s <= FB.strings && f >= 0 && f <= FB.frets) {
                                    set.add(`${s}-${f}`);
                                }
                            }
                        }
                    }
                }
            }
        }
        return map;
    }

    function repaintFretboard(barIdx, activeNotes) {
        // Clear all
        fbDotMap.forEach(el => {
            el.setAttribute('fill', 'transparent');
            el.setAttribute('stroke', 'transparent');
            el.setAttribute('r', '5.5');
        });
        // White: all notes in this bar
        const barSet = barNotesMap?.get(barIdx);
        if (barSet) {
            barSet.forEach(key => {
                const el = fbDotMap.get(key);
                if (el) {
                    el.setAttribute('fill', 'rgba(255,255,255,0.85)');
                    el.setAttribute('stroke', '#1a120c');
                }
            });
        }
        // Red: active beat
        if (activeNotes) {
            for (const note of activeNotes) {
                const key = `${note.string}-${note.fret}`;
                const el = fbDotMap.get(key);
                if (el) {
                    el.setAttribute('fill', 'var(--accent)');
                    el.setAttribute('fill', '#e94560');
                    el.setAttribute('stroke', '#fff');
                    el.setAttribute('r', '7.5');
                }
            }
        }
        // Bar label
        if (barIdx >= 0) {
            document.getElementById('fb-bar-label').textContent = 'BAR ' + (barIdx + 1);
        }
    }

    // ─────────────────────────────────────────────────────────────────────
    // SYNC OFFSET — adjustable at runtime
    // ─────────────────────────────────────────────────────────────────────
    function adjustSync(deltaMs) {
        syncOffsetMs += deltaMs;
        const sign = syncOffsetMs > 0 ? '+' : '';
        document.getElementById('sync-display').textContent = sign + syncOffsetMs + ' ms';
        // Push an immediate position update so the cursor jumps without waiting for next tick
        if (api?.player?.output && externalAudio) {
            api.player.output.updatePosition(
                ((externalAudio.currentTime / externalAudio.playbackRate) * 1000) + syncOffsetMs
            );
        }
    }
    window.adjustSync = adjustSync;

    // ─────────────────────────────────────────────────────────────────────
    // PHASE A — BOOT (must happen inside a user gesture for Safari)
    // ─────────────────────────────────────────────────────────────────────
    document.getElementById('btn-initialize').onclick = async function () {
        this.disabled = true;
        log("Boot gesture received.");

        externalAudio = document.getElementById('external-audio');

        // Persistent AudioContext — used ONLY for decoding OGG → PCM.
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();
        log("AudioContext: " + audioCtx.state);

        // Pre-touch the <audio> element inside the gesture so Safari trusts it
        // when we later swap its src and call .play() from another gesture.
        // Note: pause() races play() on this 1-frame WAV and "aborts" the
        // play promise — that's fine, the user-activation grant still sticks.
        externalAudio.src = SILENT_WAV;
        try {
            const p = externalAudio.play();
            externalAudio.pause();
            externalAudio.currentTime = 0;
            await p.catch(() => {}); // swallow expected AbortError
            log("Audio element activated.");
        } catch (e) {
            log("Audio activation skipped: " + e.message);
        }

        // ── Init alphaTab in EXTERNAL MEDIA mode ─────────────────────────
        // We do NOT set a soundFont — synth path is unused when a backing
        // track is bound. (alphaTab still loads it for fallback synth use
        // on files without an audio track. Comment out if you don't want it.)
        api = new alphaTab.AlphaTabApi(document.getElementById('at-element'), {
            core: { fontDirectory: CDN + 'font/' },
            player: {
                enablePlayer: true,
                enableCursor: true,
                enableUserInteraction: true,
                soundFont: CDN + 'soundfont/sonivox.sf2',
                playerMode: alphaTab.PlayerMode.EnabledExternalMedia
            }
        });

        wireApiEvents();
        initFretboard();

        document.getElementById('startup-screen').style.display = 'none';
        document.getElementById('app').classList.add('ready');
        log("Engine online.");
    };

    // ─────────────────────────────────────────────────────────────────────
    // PHASE B — On every score load: decode OGG → WAV, swap audio src
    // ─────────────────────────────────────────────────────────────────────
    function wireApiEvents() {

        api.scoreLoaded.on(async (score) => {
            log("Score loaded: " + (score.title || "(untitled)"));

            // Build fretboard bar-notes map and paint bar 1 immediately
            barNotesMap = buildBarNotesMap(score);
            lastPaintedBarIdx = -2;
            repaintFretboard(0, null);
            log("Fretboard map: " + barNotesMap.size + " bars indexed.");

            // alphaTab 1.8: backing track lives on score.backingTrack OR
            // score.audioTracks[0] depending on file. Try both.
            const track =
                score.backingTrack?.rawAudioFile ? { data: score.backingTrack.rawAudioFile }
                : score.audioTracks?.length ? score.audioTracks[0]
                : null;

            if (!track || !track.data) {
                log("No embedded backing track — falling back to synth.");
                externalMode = false;
                document.getElementById('mode-pill').classList.remove('live');
                document.getElementById('mode-pill').textContent = 'SYNTH';
                // For synth fallback we'd need PlayerMode.EnabledAutomatic.
                // Keeping ExternalMedia means synth is silent here. Adjust
                // upstream if you also want synth playback for non-GP8 files.
                return;
            }

            try {
                log("Decoding OGG (" + track.data.byteLength + " bytes)…");
                // decodeAudioData consumes the buffer — pass a copy.
                const oggCopy = track.data.buffer.slice(
                    track.data.byteOffset,
                    track.data.byteOffset + track.data.byteLength
                );
                const decoded = await audioCtx.decodeAudioData(oggCopy);

                log("Encoding WAV (" + decoded.duration.toFixed(2) + "s)…");
                const wavBlob = audioBufferToWavBlob(decoded);

                if (currentWavUrl) URL.revokeObjectURL(currentWavUrl);
                currentWavUrl = URL.createObjectURL(wavBlob);

                // Swap the <audio> source and wait for metadata so duration
                // is valid before alphaTab queries it via the handler.
                externalAudio.src = currentWavUrl;
                await new Promise((res, rej) => {
                    externalAudio.addEventListener('loadedmetadata', res, { once: true });
                    externalAudio.addEventListener('error', () => rej(new Error("audio load error")), { once: true });
                });
                log("WAV loaded. Duration: " + externalAudio.duration.toFixed(2) + "s");

                externalMode = true;
                document.getElementById('mode-pill').classList.add('live');
                document.getElementById('mode-pill').textContent = 'BACKING';
                document.getElementById('btn-play').disabled = false;
                document.getElementById('btn-play').textContent = "▶";
            } catch (e) {
                log("Backing track conversion failed: " + e.message);
            }
        });

        api.playerReady.on(() => {
            log("Player ready.");
            // Wire the external media handler exactly once.
            if (!handlerWired) {
                attachExternalMediaHandler();
                handlerWired = true;
            }
            document.getElementById('btn-play').disabled = false;
        });

        api.playerStateChanged.on((e) => {
            // 1 = playing, 0 = paused (alphaTab.synth.PlayerState enum)
            document.getElementById('btn-play').textContent = e.state === 1 ? '⏸' : '▶';
        });

        api.playerPositionChanged.on((e) => {
            const cur = e.currentTime / 1000, tot = e.endTime / 1000;
            const fmt = (s) => isNaN(s) ? "0:00" : Math.floor(s/60) + ":" + Math.floor(s%60).toString().padStart(2, '0');
            document.getElementById('time').textContent = `${fmt(cur)} / ${fmt(tot)}`;
            document.getElementById('prog-fill').style.width = ((e.currentTime / e.endTime) * 100 || 0) + '%';
        });

        // Drive the fretboard highlight on every beat that's actually played
        api.playedBeatChanged.on((beat) => {
            // Some alphaTab versions pass the beat directly, others wrap it.
            const b = beat?.beat || beat;
            if (!b) return;
            const barIdx = b.voice?.bar?.masterBar?.index ?? b.voice?.bar?.index ?? -1;
            repaintFretboard(barIdx, b.notes || []);
            lastPaintedBarIdx = barIdx;
        });

        api.error.on((err) => log("alphaTab error: " + (err?.message || err)));
    }

    // ─────────────────────────────────────────────────────────────────────
    // PHASE C — Bridge alphaTab ↔ <audio> via IExternalMediaHandler
    // ─────────────────────────────────────────────────────────────────────
    function attachExternalMediaHandler() {
        const handler = {
            get backingTrackDuration() {
                const d = externalAudio.duration;
                return Number.isFinite(d) ? d * 1000 : 0;
            },
            get playbackRate() { return externalAudio.playbackRate; },
            set playbackRate(v) { externalAudio.playbackRate = v; },
            get masterVolume() { return externalAudio.volume; },
            set masterVolume(v) { externalAudio.volume = v; },
            seekTo(timeMs) {
                externalAudio.currentTime = (timeMs * externalAudio.playbackRate) / 1000;
            },
            play() {
                // CRITICAL: this must run synchronously inside the play
                // button's gesture chain for Safari to permit it.
                externalAudio.play().catch(e => log("audio.play() rejected: " + e.message));
            },
            pause() { externalAudio.pause(); }
        };

        const output = api.player.output;
        if (!output) { log("No external media output available."); return; }
        output.handler = handler;
        log("External media handler attached.");

        // Feed position back to alphaTab so the cursor tracks the audio.
        const onTimeUpdate = () => {
            output.updatePosition(
                ((externalAudio.currentTime / externalAudio.playbackRate) * 1000) + syncOffsetMs
            );
        };
        externalAudio.addEventListener('timeupdate', onTimeUpdate);
        externalAudio.addEventListener('seeked', onTimeUpdate);
        externalAudio.addEventListener('play', () => {
            clearInterval(positionTimer);
            positionTimer = setInterval(onTimeUpdate, 50);
        });
        externalAudio.addEventListener('pause', () => clearInterval(positionTimer));
        externalAudio.addEventListener('ended', () => {
            clearInterval(positionTimer);
            api.pause();
        });
    }

    // ─────────────────────────────────────────────────────────────────────
    // PLAY BUTTON — strictly synchronous gesture chain
    // ─────────────────────────────────────────────────────────────────────
    document.getElementById('btn-play').onclick = () => {
        if (audioCtx.state !== 'running') audioCtx.resume();
        // In external-media mode, api.playPause() will synchronously call
        // handler.play() / handler.pause() which calls externalAudio.play().
        // Because we're still inside this click handler, Safari accepts it.
        api.playPause();
    };

    // ─────────────────────────────────────────────────────────────────────
    // FILE OPEN
    // ─────────────────────────────────────────────────────────────────────
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('song-info').textContent = file.name;
        document.getElementById('btn-play').disabled = true;
        document.getElementById('btn-play').textContent = "⏳";
        externalAudio.pause();
        externalAudio.removeAttribute('src');
        externalAudio.load();

        const reader = new FileReader();
        reader.onload = (ev) => api.load(ev.target.result);
        reader.readAsArrayBuffer(file);
    };

    // ─────────────────────────────────────────────────────────────────────
    // WAV ENCODER (16-bit PCM, interleaved, little-endian)
    // ─────────────────────────────────────────────────────────────────────
    function audioBufferToWavBlob(buffer) {
        const numCh = buffer.numberOfChannels;
        const length = buffer.length * numCh * 2 + 44;
        const out = new ArrayBuffer(length);
        const view = new DataView(out);
        let pos = 0;
        const set16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
        const set32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
        set32(0x46464952);              // "RIFF"
        set32(length - 8);
        set32(0x45564157);              // "WAVE"
        set32(0x20746d66);              // "fmt "
        set32(16);
        set16(1);                       // PCM
        set16(numCh);
        set32(buffer.sampleRate);
        set32(buffer.sampleRate * 2 * numCh);
        set16(numCh * 2);
        set16(16);
        set32(0x61746164);              // "data"
        set32(length - pos - 4);

        const channels = [];
        for (let c = 0; c < numCh; c++) channels.push(buffer.getChannelData(c));
        for (let i = 0; i < buffer.length; i++) {
            for (let c = 0; c < numCh; c++) {
                let s = Math.max(-1, Math.min(1, channels[c][i]));
                view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true);
                pos += 2;
            }
        }
        return new Blob([out], { type: "audio/wav" });
    }

    // 1-frame silent 8 kHz mono WAV — used to pre-warm the <audio> element
    // inside the boot gesture so Safari trusts later src swaps + play() calls.
