<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AlphaTab Safari — Theory Media Engine</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tonal/browser/tonal.min.js"></script>
    
    <style>
        :root { --accent: #e94560; --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0; }
        body { height: 100dvh; margin: 0; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        #app { display: flex; flex-direction: column; flex: 1 1 0; min-height: 0; opacity: 0.1; pointer-events: none; transition: opacity 0.4s; }
        #app.ready { opacity: 1; pointer-events: all; }
        #header { height: 48px; background: var(--surface); display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid #334155; flex-shrink: 0; gap: 6px; }
        #main { flex: 1 1 0; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #fff; position: relative; }
        #at-element { width: 100%; }
        #footer { height: 56px; background: var(--surface); display: flex; align-items: center; padding: 0 12px; gap: 12px; flex-shrink: 0; }
        #debug-container { height: 80px; background: #000; padding: 6px 15px; border-top: 2px solid var(--accent); flex-shrink: 0; box-sizing: border-box; display: none; }

        /* Toggle pills in header */
        .tgl { background: #334155; color: #94a3b8; border: none; width: 32px; height: 32px; border-radius: 6px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
        .tgl.on { background: var(--accent); color: white; }

        /* alphaTab playback cursor */
        .at-cursor-bar  { background: rgba(255, 242, 0, 0.25); }
        .at-cursor-beat { background: var(--accent); width: 3px; }
        .at-selection div { background: rgba(233, 69, 96, 0.1); }
        .at-highlight * { fill: var(--accent) !important; stroke: var(--accent) !important; }

        /* Unified Practice & Sync row */
        .sbtn { background: #334155; color: white; border: none; padding: 6px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; min-width: 36px; font-weight: bold; }
        .sbtn:active { background: var(--accent); }
        .sbtn.on { background: var(--accent); }
        #sync-display { text-align: center; font-family: monospace; color: var(--accent); font-weight: bold; min-width: 44px; display: inline-block; }

        #practice-row { min-height: 42px; background: var(--surface); display: flex; align-items: center; gap: 6px; padding: 6px 10px; flex-shrink: 0; border-top: 1px solid #334155; font-size: 0.7rem; flex-wrap: wrap; }
        #mixer-row { background: var(--surface); border-top: 1px solid #334155; padding: 6px 10px; flex-shrink: 0; font-size: 0.7rem; display: flex; flex-wrap: wrap; gap: 6px; max-height: 120px; overflow-y: auto; }
        #key-strip { background:#0f172a; color:#94a3b8; font-family:monospace; font-size:0.72rem; padding:4px 12px; border-top:1px solid #1e293b; border-bottom:1px solid #1e293b; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        #voicings-popover { display:none; position:fixed; z-index:9999; left:50%; bottom:170px; transform:translateX(-50%); background:#0f172a; border:1px solid #334155; border-radius:8px; padding:10px; box-shadow:0 6px 24px rgba(0,0,0,0.5); max-width:96vw; }
        #voicings-popover.open { display:block; }
        #voicings-popover .vp-head { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
        #voicings-popover #vp-title { color:#fbbf24; font-weight:700; font-size:0.95rem; font-family:monospace; }
        #voicings-popover #vp-quality { color:#7dd3fc; font-size:0.75rem; font-family:monospace; }
        #voicings-popover #vp-close { margin-left:auto; background:#1e293b; color:#fff; border:1px solid #334155; border-radius:4px; padding:2px 8px; cursor:pointer; }
        #voicings-popover #vp-quality-row { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:8px; }
        #voicings-popover .vp-q { background:#1e293b; color:#cbd5e1; border:1px solid #334155; border-radius:4px; padding:3px 8px; font-family:monospace; font-size:0.72rem; cursor:pointer; }
        #voicings-popover .vp-q.on { background:#fbbf24; color:#0f172a; border-color:#fbbf24; }
        #voicings-popover #vp-shapes { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
        #voicings-popover .vp-item { background:#1e293b; border:1px solid #334155; border-radius:6px; padding:6px; cursor:pointer; }
        #voicings-popover .vp-item:hover { background:#334155; }
        #voicings-popover .vp-item svg { display:block; }
        #key-strip .ks-key { color:#fbbf24; }
        #key-strip .ks-now { color:#e94560; }
        #key-strip .ks-rom { color:#7dd3fc; font-weight:bold; }
        .mixer-track { display: flex; align-items: center; gap: 4px; background: #0f172a; border-radius: 4px; padding: 4px 6px; }
        .mixer-track .name { color: #e2e8f0; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: bold; }
        .mixer-track .m-btn, .mixer-track .s-btn { width: 22px; height: 22px; border: none; border-radius: 3px; background: #334155; color: #94a3b8; font-size: 0.7rem; font-weight: bold; cursor: pointer; padding: 0; }
        .mixer-track .m-btn.on { background: #ef4444; color: white; }
        .mixer-track .s-btn.on { background: #22c55e; color: white; }
        #practice-row .sep { color: #475569; font-weight: bold; margin: 0 2px; }
        #practice-row select { background: #334155; color: white; border: none; padding: 6px 8px; border-radius: 4px; font-size: 0.7rem; max-width: 110px; }
        #speed-display { font-family: monospace; min-width: 44px; text-align: center; color: var(--accent); font-weight: bold; display: inline-block; }

        /* Resizable Fretboard */
        #fretboard-wrapper { height: 145px; display: flex; flex-direction: column; background: #1a120c; border-top: 1px solid #334155; flex-shrink: 0; }
        #fb-resizer { height: 16px; background: var(--surface); border-bottom: 1px solid #1a120c; display: flex; align-items: center; justify-content: center; cursor: ns-resize; touch-action: none; flex-shrink: 0; }
        #fb-resizer::after { content: ""; width: 40px; height: 4px; background: #64748b; border-radius: 2px; }
        
        #fretboard-container { flex: 1; overflow-x: auto; overflow-y: hidden; -webkit-overflow-scrolling: touch; position: relative; white-space: nowrap; }
        #fretboard { display: inline-block; height: 100%; }
        #fretboard svg { display: block; height: 100%; width: auto; }
        
        .fb-dot { transition: fill 90ms linear, stroke 90ms linear, r 90ms linear; pointer-events: none; }
        .fb-text { font-size: 6.5px; font-family: sans-serif; font-weight: bold; fill: #fff; text-anchor: middle; dominant-baseline: central; pointer-events: none; opacity: 0; transition: opacity 90ms linear; }
        
        #fb-chord-label { position: absolute; top: 4px; left: 8px; font-size: 0.8rem; color: #3b82f6; font-family: sans-serif; font-weight: 800; pointer-events: all; cursor: pointer; z-index: 2; }
        #fb-bar-label { position: absolute; top: 4px; right: 8px; font-size: 0.65rem; color: var(--accent); font-family: monospace; font-weight: bold; pointer-events: none; z-index: 2; }
        
        #debug-log { font-size: 11px; color: #fbbf24; font-family: monospace; height: 100%; overflow-y: auto; margin: 0; white-space: pre-wrap; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.5; cursor: wait; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: var(--bg); }
        .pill { font-size: 0.7rem; padding: 3px 8px; border-radius: 999px; background: #334155; color: #94a3b8; }
        .pill.live { background: #14532d; color: #86efac; }

        /* Top-of-app status banner for alignment / async actions */
        #align-banner { position: fixed; top: 56px; left: 12px; right: 12px; z-index: 9999; background: #1e293b; color: #fbbf24; border-left: 4px solid var(--accent); padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 700; box-shadow: 0 6px 18px rgba(0,0,0,0.5); display: none; cursor: pointer; }
        #align-banner.live { display: block; }
        #align-banner.ok   { color: #86efac; border-left-color: #22c55e; }
        #align-banner.err  { color: #fca5a5; border-left-color: #ef4444; }
    </style>
</head>
<body>

<div id="startup-screen" class="overlay">
    <button class="btn" id="btn-initialize" style="padding: 15px 30px; font-size: 1.2rem;">BOOT ENGINE</button>
    <div style="margin-top: 12px; font-size: 0.75rem; opacity: 0.6;">Required by Safari to unlock audio</div>
</div>

<div id="app">
    <div id="header">
        <div style="font-weight: 800; color: var(--accent); font-size: 0.9rem;">αTab</div>
        <span id="mode-pill" class="pill">SYNTH</span>
        <div id="song-info" style="flex:1; font-size: 0.75rem; opacity: 0.7; padding-left: 4px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Load a .gp file…</div>
        <button class="tgl on" id="tgl-practice" title="Settings" onclick="togglePanel('practice-row', this)">⚙</button>
        <button class="tgl on" id="tgl-fb" title="Fretboard" onclick="togglePanel('fretboard-wrapper', this)">🎸</button>
        <button class="tgl"    id="tgl-mixer" title="Mixer (mute/solo per track)" onclick="togglePanel('mixer-row', this)">🎚</button>
        <button class="tgl"    id="tgl-log" title="Debug log" onclick="togglePanel('debug-container', this)">📋</button>
        <button class="btn" style="padding: 6px 10px; font-size: 0.85rem;" onclick="document.getElementById('file-input').click()" title="Load score (.gp, .gpx, .xml, .pdf)">📁</button>
        <button class="btn" id="btn-upload-mp3" style="padding: 6px 10px; font-size: 0.85rem; background:#334155;" onclick="document.getElementById('mp3-input').click()" title="Upload backing track (MP3/WAV/OGG)">🎵</button>
        <button class="tgl" id="btn-align" title="Align current score with current MP3 (DTW)" onclick="alignCurrentScoreWithMp3()">🎼</button>
        <button class="tgl on" id="btn-surf" title="Tremolo + spring reverb (surf chain)" onclick="toggleSurf()">🌊</button>
        <button class="btn" style="padding: 6px 10px; font-size: 0.85rem; background:#475569;" onclick="document.getElementById('sf2-input').click()" title="Load a real-guitar SoundFont (.sf2 / .sf3) — e.g. a Stratocaster sampleset from soundfonts4u">🎚</button>
        <button class="btn" style="padding: 6px 10px; font-size: 0.85rem; background:#475569;" onclick="resetSoundFont()" title="Reset to the default Sonivox SoundFont">↺</button>
        <input type="file" id="file-input" style="display:none" />
        <input type="file" id="sf2-input" accept=".sf2,.sf3" style="display:none" />
        <input type="file" id="mp3-input" style="display:none" />
    </div>
    <div id="key-strip" title="Detected song key + Roman-numeral of the current chord">—</div>
    <div id="main"><div id="at-element"></div></div>
    <div id="voicings-popover" role="dialog" aria-hidden="true">
        <div class="vp-head">
            <span id="vp-title">—</span>
            <span id="vp-quality"></span>
            <button id="vp-close" onclick="closeVoicings()">✕</button>
        </div>
        <div id="vp-quality-row"></div>
        <div id="vp-shapes"></div>
    </div>
    <div id="footer">
        <button class="btn" id="btn-play" disabled style="width: 50px; height: 40px; font-size: 1.3rem; padding: 0;">▶</button>
        <div style="flex:1;">
            <div id="time" style="font-size: 0.75rem; font-family: monospace; color: #94a3b8;">0:00 / 0:00</div>
            <div style="height: 5px; background: #334155; border-radius: 3px; overflow: hidden; margin-top: 3px;">
                <div id="prog-fill" style="height: 100%; background: var(--accent); width: 0%;"></div>
            </div>
        </div>
    </div>
</div>

<audio id="external-audio" preload="auto" playsinline style="display:none"></audio>
<div id="align-banner" title="Click to dismiss"></div>

<div id="practice-row">
    <button class="sbtn" id="btn-loop-a" title="Set loop A" onclick="setLoopA()">A</button>
    <button class="sbtn" id="btn-loop-b" title="Set loop B" onclick="setLoopB()">B</button>
    <button class="sbtn" id="btn-loop-toggle" title="Toggle loop" onclick="toggleLoop()">⟲</button>
    <span class="sep">|</span>
    <button class="sbtn" onclick="adjustSpeed(-0.05)">−</button>
    <span id="speed-display">1.00×</span>
    <button class="sbtn" onclick="adjustSpeed(0.05)">+</button>
    <span class="sep">|</span>
    <select id="track-select"><option value="-1">All tracks</option></select>
    <button class="sbtn" id="btn-countin" title="Count-in before play" onclick="toggleCountIn()">📯</button>
    <button class="sbtn" onclick="adjustZoom(-0.1)">−🔍</button>
    <button class="sbtn" onclick="adjustZoom(0.1)">+🔍</button>
    <span class="sep">|</span>
    <button class="sbtn" id="btn-theory" title="Cycle overlay: off → arpeggio (chord tones) → scale (chord tones + parent scale)" onclick="toggleTheory()" style="color:#fbbf24;">🎓 THEORY</button>
    <select id="scale-flavour" title="Scale family used in SCALE mode" onchange="setScaleFlavour(this.value)" style="background:#1e293b;color:#fbbf24;border:1px solid #334155;border-radius:4px;padding:3px 4px;font-size:0.75rem;">
        <option value="natural">Natural</option>
        <option value="harmonic">Harmonic m</option>
        <option value="melodic">Melodic m</option>
        <option value="dim">Diminished</option>
    </select>
    <select id="scale-box" title="Restrict the scale overlay to a position/box on the neck" onchange="setScaleBox(this.value)" style="background:#1e293b;color:#fbbf24;border:1px solid #334155;border-radius:4px;padding:3px 4px;font-size:0.75rem;">
        <option value="all">All neck</option>
        <option value="1">Pos 1</option>
        <option value="2">Pos 2</option>
        <option value="3">Pos 3</option>
        <option value="4">Pos 4</option>
        <option value="5">Pos 5</option>
    </select>
    <select id="interval-pattern" title="Diatonic 3rds / 6ths double-stop overlay (Cuban / Latin / Spanish guitar vocabulary). Each pair is drawn with a connecting line." onchange="setIntervalPattern(this.value)" style="background:#1e293b;color:#fbbf24;border:1px solid #334155;border-radius:4px;padding:3px 4px;font-size:0.75rem;">
        <option value="off">Intervals: Off</option>
        <option value="3rds">3rds</option>
        <option value="6ths">6ths</option>
        <option value="both">3rds + 6ths</option>
    </select>
    <button class="sbtn" id="btn-related" title="Overlay the related chord (V7→dim7 substitution, minor↔relative major) as a pink stroke" onclick="toggleRelated()" style="color:#ec4899;">🔗 REL</button>
    <button class="sbtn" id="btn-notes" title="Show note names on every fret instead of interval labels" onclick="toggleNoteNames()" style="color:#a3e635;">🔤 NOTES</button>
    <span class="sep">|</span>
    <span style="color: #94a3b8; font-weight: bold;">SYNC</span>
    <button class="sbtn" onclick="adjustSync(-1000)">−1s</button>
    <button class="sbtn" onclick="adjustSync(-100)">−100</button>
    <button class="sbtn" onclick="adjustSync(-10)">−10</button>
    <button class="sbtn" onclick="adjustSync(-5)">−5</button>
    <span id="sync-display">0 ms</span>
    <button class="sbtn" onclick="adjustSync(5)">+5</button>
    <button class="sbtn" onclick="adjustSync(10)">+10</button>
    <button class="sbtn" onclick="adjustSync(100)">+100</button>
    <button class="sbtn" onclick="adjustSync(1000)">+1s</button>
</div>

<div id="mixer-row" style="display:none;"></div>

<div id="fretboard-wrapper">
    <div id="fb-resizer"></div>
    <div id="fretboard-container">
        <span id="fb-chord-label" title="Click to cycle chord extensions"></span>
        <span id="fb-bar-label">BAR —</span>
        <div id="fretboard"></div>
    </div>
</div>

<div id="debug-container"><pre id="debug-log">Engine offline.</pre></div>

<script>
// --- BULLETPROOF INIT WRAPPER ---
document.addEventListener("DOMContentLoaded", function() {

    const log = (m) => {
        const l = document.getElementById('debug-log');
        if(!l) return;
        l.innerText += "\n> " + m;
        l.scrollTop = l.scrollHeight;
    };
    const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';
    const ALIGN_API_URL = 'https://lmondelaers-guitartranscribe.hf.space';

    let api, audioCtx;
    let externalAudio;
    let currentWavUrl = null;
    let positionTimer = 0;
    let externalHandlerAttached = false;
    let externalMode = false;
    let syncOffsetMs = 0;
    let barNotesMap = null;
    let fbDotMap = new Map();
    let fbTxtMap = new Map();
    let lastPaintedBarIdx = -2;
    let lastActiveNotes = null;
    let uploadedMp3Key = null;  // filename:size of manually uploaded audio (if any)
    let scoreFileKey = null;    // filename:size of the loaded score
    let lastScoreFile = null;   // File object of last loaded score (for /align)
    let lastAudioFile = null;   // File object of last loaded audio (for /align)
    let pendingPdfFile = null;  // PDF waiting for an MP3 to align against
    let alignmentActive = false;
    let warpByAudio = [];       // [{a, s}] sorted by audio_sec
    let warpByScore = [];       // [{a, s}] sorted by score_sec
    const GUITAR_PROGRAM_CLEAN = 27; // GM: Electric Guitar (clean)

    // Practice state
    let scoreRef = null;
    let loopStartMs = -1;
    let loopEndMs = -1;
    let isLoopOn = false;
    let isCountInOn = false;
    let currentSpeed = 1.0;
    let currentZoom = 1.0;
    let currentTrackIdx = -1;   

    // THEORY ENGINE STATE
    // overlayMode: 'off' | 'arp' | 'scale'
    //   off   → no theory overlay (just played notes light up)
    //   arp   → every fret position that's a chord tone, coloured by interval
    //   scale → arp + parent-scale tones in muted teal
    let overlayMode = 'off';
    let scaleFlavour = 'natural';   // 'natural'|'harmonic'|'melodic'|'dim'
    let scaleBox = 'all';           // 'all'|'1'|'2'|'3'|'4'|'5'
    let showRelated = false;
    let showNoteNames = false;
    let intervalPattern = 'off';   // 'off'|'3rds'|'6ths'|'both'
    let activeChordName = "";
    let songKey = null;             // { tonic: 'B', mode: 'minor' } | null
    let extCycle = 0;
    let baseChord = "";
    const standardTuningMidi = [64, 59, 55, 50, 45, 40];
    const NOTE_NAMES_SHARP = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    // Tuning indexed by alphaTab string convention (s=1 = high E, s=6 = low E).
    const STRING_MIDI_BY_AT = { 1: 64, 2: 59, 3: 55, 4: 50, 5: 45, 6: 40 };

    // ─────────────────────────────────────────────────────────────────────
    // RESIZABLE FRETBOARD DRAG LOGIC
    // ─────────────────────────────────────────────────────────────────────
    const fbWrapper = document.getElementById('fretboard-wrapper');
    const fbResizer = document.getElementById('fb-resizer');
    let isResizingFb = false;
    let fbStartY = 0;
    let fbStartHeight = 0;

    function startFbResize(y) {
        isResizingFb = true;
        fbStartY = y;
        fbStartHeight = fbWrapper.getBoundingClientRect().height;
        document.body.style.userSelect = 'none';
        document.body.style.webkitUserSelect = 'none'; // Safari fix
    }

    function doFbResize(y, e) {
        if (!isResizingFb) return;
        if (e && e.cancelable) e.preventDefault(); 
        const delta = fbStartY - y;
        let newH = fbStartHeight + delta;
        newH = Math.max(60, Math.min(newH, window.innerHeight * 0.7)); 
        fbWrapper.style.height = newH + 'px';
    }

    function stopFbResize() {
        if (isResizingFb) {
            isResizingFb = false;
            document.body.style.userSelect = '';
            document.body.style.webkitUserSelect = '';
            if (api && api.render) setTimeout(() => api.render(), 0); 
        }
    }

    if (fbResizer) {
        fbResizer.addEventListener('touchstart', e => startFbResize(e.touches[0].clientY), { passive: false });
        document.addEventListener('touchmove', e => { if (isResizingFb) doFbResize(e.touches[0].clientY, e); }, { passive: false });
        document.addEventListener('touchend', stopFbResize);

        fbResizer.addEventListener('mousedown', e => startFbResize(e.clientY));
        document.addEventListener('mousemove', e => { if (isResizingFb) doFbResize(e.clientY, e); });
        document.addEventListener('mouseup', stopFbResize);
    }

    // ─────────────────────────────────────────────────────────────────────
    // FRETBOARD VISUALIZATION
    // ─────────────────────────────────────────────────────────────────────
    const FB = {
        strings: 6, frets: 18,
        fretWidth: 48, stringGap: 13,
        padTop: 14, padBottom: 18, padLeft: 28, padRight: 16,
        nutWidth: 7
    };

    function buildFretboardSVG() {
        const w = FB.padLeft + FB.nutWidth + FB.frets * FB.fretWidth + FB.padRight;
        const h = FB.padTop + (FB.strings - 1) * FB.stringGap + FB.padBottom;
        const boardTop = FB.padTop - 7;
        const boardBot = FB.padTop + (FB.strings - 1) * FB.stringGap + 7;
        const stringX0 = FB.padLeft - 6;
        const stringX1 = w - FB.padRight;

        const parts = [];
        parts.push(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" style="height: 100%; width: auto; aspect-ratio: ${w} / ${h};">`);

        parts.push(`<rect x="${FB.padLeft}" y="${boardTop}" width="${FB.nutWidth + FB.frets * FB.fretWidth}" height="${boardBot - boardTop}" fill="#3a2618"/>`);
        parts.push(`<rect x="${FB.padLeft}" y="${boardTop}" width="${FB.nutWidth}" height="${boardBot - boardTop}" fill="#e8d8b8"/>`);

        for (let f = 1; f <= FB.frets; f++) {
            const x = FB.padLeft + FB.nutWidth + f * FB.fretWidth;
            parts.push(`<line x1="${x}" y1="${boardTop}" x2="${x}" y2="${boardBot}" stroke="#a89070" stroke-width="1.5"/>`);
        }

        const midY = FB.padTop + ((FB.strings - 1) * FB.stringGap) / 2;
        for (const fr of [3, 5, 7, 9, 15, 17]) {
            if (fr > FB.frets) continue;
            const x = FB.padLeft + FB.nutWidth + (fr - 0.5) * FB.fretWidth;
            parts.push(`<circle cx="${x}" cy="${midY}" r="3.5" fill="#5a3e28"/>`);
        }
        for (const fr of [12]) {
            if (fr > FB.frets) continue;
            const x = FB.padLeft + FB.nutWidth + (fr - 0.5) * FB.fretWidth;
            parts.push(`<circle cx="${x}" cy="${FB.padTop + 1.2 * FB.stringGap}" r="3.5" fill="#5a3e28"/>`);
            parts.push(`<circle cx="${x}" cy="${FB.padTop + 3.8 * FB.stringGap}" r="3.5" fill="#5a3e28"/>`);
        }

        for (let f = 1; f <= FB.frets; f++) {
            const x = FB.padLeft + FB.nutWidth + (f - 0.5) * FB.fretWidth;
            parts.push(`<text x="${x}" y="${boardBot + 11}" text-anchor="middle" font-size="9" fill="#7a6450" font-family="monospace">${f}</text>`);
        }

        for (let s = 1; s <= FB.strings; s++) {
            const y = FB.padTop + (s - 1) * FB.stringGap;
            const thickness = 0.8 + (s - 1) * 0.25;
            parts.push(`<line x1="${stringX0}" y1="${y}" x2="${stringX1}" y2="${y}" stroke="#d8d8d8" stroke-width="${thickness}"/>`);
        }

        for (let s = 1; s <= FB.strings; s++) {
            const y = FB.padTop + (s - 1) * FB.stringGap;
            parts.push(`<circle class="fb-dot" id="fb-dot-${s}-0" cx="${FB.padLeft - 14}" cy="${y}" r="5.5" fill="transparent" stroke="transparent" stroke-width="1.5"/>`);
            parts.push(`<text class="fb-text" id="fb-txt-${s}-0" x="${FB.padLeft - 14}" y="${y}"></text>`);
            
            for (let f = 1; f <= FB.frets; f++) {
                const x = FB.padLeft + FB.nutWidth + (f - 0.5) * FB.fretWidth;
                parts.push(`<circle class="fb-dot" id="fb-dot-${s}-${f}" cx="${x}" cy="${y}" r="5.5" fill="transparent" stroke="transparent" stroke-width="1.5"/>`);
                parts.push(`<text class="fb-text" id="fb-txt-${s}-${f}" x="${x}" y="${y}"></text>`);
            }
        }

        parts.push('<g id="fb-badges"></g>');
        parts.push('</svg>');
        return parts.join('');
    }

    // alphaTab note ornaments → motion / badges on the active fret dot.
    //
    // For pitch-changing effects (bend, slide, vibrato) we animate the
    // dot itself so the motion mirrors what's happening to the note. For
    // discrete attributes (hammer-on / pull-off / harmonic / palm mute)
    // we keep a small badge label since there's no natural motion.
    //
    // alphaTab BendPoint values are quarter-tones (4 = whole step).
    // SlideOutType: 1=Shift, 2=Legato, 3=OutUp, 4=OutDown, 5=PickUp, 6=PickDown.
    // SlideInType: 1=IntoFromBelow, 2=IntoFromAbove.
    // VibratoType: any non-zero = vibrato.
    function ornamentBadges(note) {
        const out = [];
        if (note.isHammerPullOrigin || note.hammerPullOrigin) {
            const dst = note.hammerPullDestination;
            const sym = (dst && typeof dst.fret === 'number' && dst.fret > note.fret) ? 'H' : 'P';
            out.push({ text: sym, fill: '#9be3a8' });
        }
        if (note.harmonicType && note.harmonicType !== 0) {
            out.push({ text: '◆', fill: '#ffe066' });
        }
        if (note.isPalmMute) {
            out.push({ text: 'PM', fill: '#aaa' });
        }
        return out;
    }

    // Animate a fret dot to mirror bend / slide / vibrato. Returns an
    // array of Animation objects so callers can cancel them on the next
    // repaint (or we'd leak motion across beats).
    function applyEffectAnims(dot, note, prevNotes) {
        const anims = [];
        const fw = FB.fretWidth;

        // Bend: peak amount in semitones determines a partial-fret rightward shift.
        if (note.bendType && note.bendType !== 0) {
            const peakSemis = (note.bendPoints?.length)
                ? note.bendPoints.reduce((m, p) => Math.max(m, (p?.value || 0)), 0) / 4
                : 1;
            const dx = peakSemis * fw * 0.45;
            if (dx > 0.5) {
                anims.push(dot.animate([
                    { transform: 'translate(0px, 0px)' },
                    { transform: `translate(${dx}px, 0px)`, offset: 0.45 },
                    { transform: `translate(${dx}px, 0px)` }
                ], { duration: 380, fill: 'forwards' }));
            }
        }

        // Slide-INTO. Either the note declares slideInType, or the
        // previous beat's same-string note slid out toward us.
        const slideIn = note.slideInType || note.slideType || 0;
        let slideFromDx = null;
        if (slideIn === 1) slideFromDx = -fw * 1.5;       // from below
        else if (slideIn === 2) slideFromDx =  fw * 1.5;  // from above

        const prevSrc = prevNotes?.find(p =>
            p.string === note.string
            && (p.slideOutType === 1 || p.slideOutType === 2)
        );
        if (prevSrc && typeof prevSrc.fret === 'number') {
            slideFromDx = (prevSrc.fret - note.fret) * fw;
        }
        if (slideFromDx !== null && Math.abs(slideFromDx) > 0.5) {
            anims.push(dot.animate([
                { transform: `translate(${slideFromDx}px, 0px)` },
                { transform: 'translate(0px, 0px)' }
            ], { duration: 200, fill: 'forwards' }));
        }

        // Slide-OUT without a target: drift in the slide direction during
        // the latter half of the beat so the visual decays naturally.
        const slideOut = note.slideOutType || 0;
        let outDx = 0;
        if (slideOut === 3 || slideOut === 5) outDx =  fw * 1.5;   // out up
        else if (slideOut === 4 || slideOut === 6) outDx = -fw * 1.5;  // out down
        if (outDx !== 0) {
            anims.push(dot.animate([
                { transform: 'translate(0px, 0px)', offset: 0.4 },
                { transform: `translate(${outDx}px, 0px)`, offset: 1 }
            ], { duration: 360, fill: 'forwards' }));
        }

        // Vibrato: small continuous oscillation while the beat is held.
        if (note.vibrato && note.vibrato !== 0) {
            anims.push(dot.animate([
                { transform: 'translate(-1.5px, 0px)' },
                { transform: 'translate(1.5px, 0px)' }
            ], { duration: 110, iterations: Infinity, direction: 'alternate' }));
        }

        // Hammer-on / Pull-off destination: by the time we reach this
        // beat the origin has already played and disappeared. Animate
        // the destination dot moving from the origin fret to its actual
        // cell, AND temporarily light up the origin cell with a faded
        // dot so the user can see where the slur came from. Origin info
        // can come either from an explicit hammerPullOrigin reference
        // on the destination note, or from the previous beat's notes.
        let hpOriginFret = null;
        if (note.hammerPullOrigin && typeof note.hammerPullOrigin.fret === 'number') {
            hpOriginFret = note.hammerPullOrigin.fret;
        } else {
            const src = prevNotes?.find(p =>
                p.string === note.string && (p.isHammerPullOrigin || p.hammerPullDestination)
            );
            if (src) hpOriginFret = src.fret;
        }
        if (hpOriginFret !== null && hpOriginFret !== note.fret) {
            const dx = (hpOriginFret - note.fret) * fw;
            anims.push(dot.animate([
                { transform: `translate(${dx}px, 0px)` },
                { transform: 'translate(0px, 0px)' }
            ], { duration: 160, fill: 'forwards' }));

            const mappedStr = FB.strings - note.string + 1;
            const originDot = fbDotMap.get(`${mappedStr}-${hpOriginFret}`);
            if (originDot && originDot !== dot) {
                originDot.setAttribute('fill', 'rgba(233, 69, 96, 0.40)');
                originDot.setAttribute('stroke', 'rgba(255, 255, 255, 0.5)');
                originDot.setAttribute('stroke-width', '1');
                originDot.setAttribute('r', '6.5');
            }
        }

        return anims;
    }

    // alphaTab fires playedBeatChanged for one voice at a time. When a
    // multi-voice arrangement has e.g. a held bass on voice 2 + melody
    // on voice 1, only the active voice's notes appear in `b.notes`,
    // so the other voice's simultaneously sounding notes get hidden.
    // Collect notes from every voice (and every track) whose beat
    // window contains this beat's start time.
    function collectSoundingNotes(currentBeat) {
        const t = currentBeat.absolutePlaybackStart || 0;
        const FRESH_TOL_MS = 5;  // beats whose start ≈ t are "fresh hits"
        const entries = new Map();  // (string,fret) → { note, fresh }

        const tryAdd = (note, beat, fresh) => {
            const k = `${note.string}-${note.fret}`;
            const strikeMs = beat.absolutePlaybackStart || 0;
            const prior = entries.get(k);
            if (!prior) entries.set(k, { note, fresh, strikeMs });
            else if (fresh && !prior.fresh) entries.set(k, { note, fresh, strikeMs });
            else if (!fresh && !prior.fresh && strikeMs > prior.strikeMs) {
                // Two sustaining sources for the same cell: keep the newer
                // strike so the fade reflects the most recent attack.
                entries.set(k, { note, fresh, strikeMs });
            }
        };

        const noteEndMs = (note, beat) => {
            const beatEnd = (beat.absolutePlaybackStart || 0) + (beat.playbackDuration || 0);
            if (note.isTieOrigin) {
                let cur = note.tieDestination, end = beatEnd;
                while (cur) {
                    const cb = cur.beat;
                    if (cb) end = (cb.absolutePlaybackStart || 0) + (cb.playbackDuration || 0);
                    cur = cur.tieDestination;
                }
                return end;
            }
            if (note.isLetRing) {
                const RING_MAX_MS = 1500;
                const beats = beat.voice?.beats || [];
                let foundSelf = false;
                for (const ob of beats) {
                    if (ob === beat) { foundSelf = true; continue; }
                    if (!foundSelf) continue;
                    if ((ob.notes || []).some(n => n.string === note.string)) {
                        return ob.absolutePlaybackStart || 0;
                    }
                }
                return beatEnd + RING_MAX_MS;
            }
            return beatEnd;
        };

        const processVoice = (voice) => {
            for (const beat of (voice.beats || [])) {
                const bs = beat.absolutePlaybackStart || 0;
                if (bs > t) break;
                const be = bs + (beat.playbackDuration || 0);
                const playsNow = bs <= t && t < be;
                const beatStartedNow = bs >= t - FRESH_TOL_MS;
                for (const note of (beat.notes || [])) {
                    if (playsNow) {
                        // Fresh hit if this beat just started AND the note
                        // is the strike (not a tie continuation).
                        const fresh = beatStartedNow && !note.isTieDestination;
                        tryAdd(note, beat, fresh);
                        continue;
                    }
                    if (noteEndMs(note, beat) > t) tryAdd(note, beat, false);
                }
            }
        };

        const bar = currentBeat.voice?.bar;
        if (bar?.voices) {
            for (const voice of bar.voices) processVoice(voice);
        }

        const score = bar?.staff?.track?.score;
        if (score?.tracks?.length > 1) {
            const mIdx = bar?.masterBar?.index;
            for (const tk of score.tracks) {
                if (tk === bar.staff.track) continue;
                for (const stf of (tk.staves || [])) {
                    for (const obar of (stf.bars || [])) {
                        if (obar.masterBar?.index !== mIdx) continue;
                        for (const voice of (obar.voices || [])) processVoice(voice);
                    }
                }
            }
        }

        const out = [];
        for (const { note, fresh, strikeMs } of entries.values()) {
            note.__fbFresh = fresh;
            note.__fbStrikeMs = strikeMs;
            note.__fbCurrentMs = t;
            out.push(note);
        }
        return out;
    }

    let prevActiveNotes = null;

    function initFretboard() {
        const fbDiv = document.getElementById('fretboard');
        if(fbDiv) fbDiv.innerHTML = buildFretboardSVG();
        fbDotMap.clear();
        fbTxtMap.clear();
        for (let s = 1; s <= FB.strings; s++) {
            for (let f = 0; f <= FB.frets; f++) {
                const el = document.getElementById(`fb-dot-${s}-${f}`);
                const txt = document.getElementById(`fb-txt-${s}-${f}`);
                if (el) fbDotMap.set(`${s}-${f}`, el);
                if (txt) fbTxtMap.set(`${s}-${f}`, txt);
            }
        }
    }

    function buildBarNotesMap(score) {
        const map = new Map();
        for (const track of score.tracks || []) {
            for (const staff of track.staves || []) {
                for (const bar of staff.bars || []) {
                    const idx = bar.masterBar?.index ?? bar.index ?? -1;
                    if (idx < 0) continue;
                    if (!map.has(idx)) map.set(idx, new Set());
                    const set = map.get(idx);
                    for (const voice of bar.voices || []) {
                        for (const beat of voice.beats || []) {
                            for (const note of beat.notes || []) {
                                const mappedString = FB.strings - note.string + 1;
                                const f = note.fret;
                                if (mappedString > 0 && mappedString <= FB.strings && f >= 0 && f <= FB.frets) {
                                    set.add(`${mappedString}-${f}`);
                                }
                            }
                        }
                    }
                }
            }
        }
        return map;
    }

    // ─────────────────────────────────────────────────────────────────────
    // THEORY ENGINE & PAINTING
    // ─────────────────────────────────────────────────────────────────────
    function getIntervalColor(ivl) {
        if (ivl.startsWith('1')) return 'rgba(239, 68, 68, 0.6)';   
        if (ivl.startsWith('3')) return 'rgba(245, 158, 11, 0.6)'; 
        if (ivl.startsWith('5')) return 'rgba(59, 130, 246, 0.6)'; 
        if (ivl.startsWith('7')) return 'rgba(139, 92, 246, 0.6)'; 
        return 'rgba(16, 185, 129, 0.6)';                          
    }

    function extractChordFromBeat(beat) {
        if (!beat || !beat.voice || !beat.voice.beats) return null;
        let chordName = null;
        for (const b of beat.voice.beats) {
            if (b.absolutePlaybackStart > beat.absolutePlaybackStart) break;
            if (b.chord && b.chord.name) chordName = b.chord.name;
        }
        return chordName;
    }

    // Pick a parent scale for a chord based on its Tonal `type` and the
    // user-selected scale flavour. Flavours:
    //
    //   natural    → Ionian / Aeolian / Mixolydian / Locrian / Lydian-aug
    //   harmonic   → minor → harmonic minor; V7 → Phrygian dominant
    //   melodic    → minor → melodic minor; V7 → altered; maj → Lydian
    //   dim        → dim/m7b5 → whole-half dim; V7 → half-whole dim
    //                (other qualities fall back to natural)
    //
    // Scale names match Tonal.Scale.get(...) keys.
    function chordToScaleName(chordData, flavour) {
        flavour = flavour || 'natural';
        const t = (chordData?.type || '').toLowerCase();
        const isHalfDim = /half|m7b5|flat five/.test(t);
        const isDim = /diminished/.test(t) && !isHalfDim;
        const isAug = /augmented/.test(t);
        const isDom = /dominant|seventh suspended/.test(t);
        const isMinor = /minor/.test(t) && !isHalfDim;
        const isMajor = !isMinor && !isDom && !isDim && !isHalfDim && !isAug;

        if (flavour === 'harmonic') {
            if (isMinor)   return 'harmonic minor';
            if (isDom)     return 'phrygian dominant';
            if (isHalfDim) return 'locrian';
            if (isAug)     return 'lydian augmented';
            if (isDim)     return 'whole half diminished';
            return 'major';
        }
        if (flavour === 'melodic') {
            if (isMinor)   return 'melodic minor';
            if (isDom)     return 'altered';
            if (isHalfDim) return 'locrian pentatonic';   // ≈ Locrian #2 family
            if (isAug)     return 'lydian augmented';
            if (isDim)     return 'whole half diminished';
            if (isMajor)   return 'lydian';
            return 'major';
        }
        if (flavour === 'dim') {
            if (isDim || isHalfDim) return 'whole half diminished';
            if (isDom)              return 'half whole diminished';
            // Other qualities have no good dim mapping → natural fallback.
        }
        // natural (default + fallback for unmapped flavour×quality combos)
        if (isHalfDim) return 'locrian';
        if (isDim)     return 'locrian';
        if (isAug)     return 'lydian augmented';
        if (isDom)     return 'mixolydian';
        if (isMinor)   return 'aeolian';
        return 'major';
    }

    // Compute chord symbols related to the active chord. Most useful:
    //   V7  → dim7 a half-step above the root (rootless V7♭9 substitute)
    //   m   → relative major triad (a m3 above root)
    //   M   → relative minor triad (a M6 above root)
    // Returns an array of chord symbols suitable for Tonal.Chord.get.
    const PC_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    function relatedChordSymbols(chordData) {
        if (!chordData?.tonic) return [];
        const tonicPc = Tonal.Note.get(chordData.tonic).chroma;
        if (tonicPc == null) return [];
        const pc = (n) => PC_NAMES[((tonicPc + n) % 12 + 12) % 12];
        const t = (chordData.type || '').toLowerCase();
        if (/dominant|seventh suspended/.test(t)) {
            return [`${pc(1)}dim7`];           // V7 → bII°7 (= rootless V7b9)
        }
        if (/half|m7b5|flat five/.test(t)) {
            return [`${pc(0)}dim7`];           // ø ↔ °7 on same root
        }
        if (/diminished/.test(t)) {
            // dim7 is symmetric — show the three other inversions
            return [`${pc(3)}dim7`, `${pc(6)}dim7`, `${pc(9)}dim7`];
        }
        if (/^minor|minor sixth|minor seventh|minor ninth|^m/.test(t)) {
            return [`${pc(3)}`];                // m → relative major triad
        }
        if (/major|sixth|seventh|ninth/.test(t)) {
            return [`${pc(9)}m`];               // M → relative minor triad
        }
        return [];
    }

    // ─────────────────────────────────────────────────────────────────────
    // SCALE-BOX RESTRICTION (positions 1-5)
    // ─────────────────────────────────────────────────────────────────────
    // Each pentatonic/CAGED position is a roughly-4-fret window relative
    // to the song key's root on string 6 (low E). Returns [minFret,
    // maxFret] for a given rootPc and box index. 'all' returns null
    // (= no restriction).
    function scaleBoxWindow(rootPc, box) {
        if (box === 'all' || rootPc == null) return null;
        const lowE = 4;
        const rootFret = ((rootPc - lowE) % 12 + 12) % 12;
        const offsets = { '1': [0, 3], '2': [2, 5], '3': [4, 7], '4': [7, 10], '5': [9, 12] };
        const off = offsets[box];
        if (!off) return null;
        // Return the primary window AND its octave-shifted twin so the
        // pattern is visible at both ends of the neck.
        return [
            [rootFret + off[0], rootFret + off[1]],
            [rootFret + off[0] + 12, rootFret + off[1] + 12],
        ];
    }

    function setScaleBox(v) {
        scaleBox = v;
        try { localStorage.setItem('alphaTab.scaleBox', v); } catch (_) {}
        const sel = document.getElementById('scale-box');
        if (sel && sel.value !== v) sel.value = v;
        if (overlayMode === 'scale') {
            repaintFretboard(lastPaintedBarIdx, lastActiveNotes);
            updateKeyStrip();
        }
    }
    window.setScaleBox = setScaleBox;
    try {
        const saved = localStorage.getItem('alphaTab.scaleBox');
        if (saved) scaleBox = saved;

    document.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('scale-box');

    });

    // ─────────────────────────────────────────────────────────────────────
    // INTERVAL PATTERNS — diatonic 3rds + 6ths overlay
    // ─────────────────────────────────────────────────────────────────────
    // Core vocabulary of Cuban / son / bolero / danzón / flamenco guitar:
    // diatonic 3rds on adjacent strings and 6ths on skip-one-string pairs,
    // walked through the parent scale. Use Harmonic Minor for the
    // Spanish-Cuban flavour (the augmented 2nd gives the colour).
    //
    // 3rds — adjacent string pairs (higher pitch on lower-numbered string
    //        in alphaTab convention, since s1 = high E).
    // 6ths — skip-one-string pairs.
    const INTERVAL_STRING_PAIRS = {
        '3rds': [
            { hi: 1, lo: 2 }, // high E + B
            { hi: 2, lo: 3 }, // B + G
            { hi: 3, lo: 4 }, // G + D
            { hi: 4, lo: 5 }, // D + A
            { hi: 5, lo: 6 }, // A + low E
        ],
        '6ths': [
            { hi: 1, lo: 3 }, // high E + G  (skip B)
            { hi: 2, lo: 4 }, // B + D       (skip G)
            { hi: 3, lo: 5 }, // G + A       (skip D)
            { hi: 4, lo: 6 }, // D + low E   (skip A)
        ],
    };
    const INTERVAL_COLORS = { '3rds': '#3b82f6', '6ths': '#f97316' };

    function setIntervalPattern(v) {
        intervalPattern = v;
        try { localStorage.setItem('alphaTab.intervalPattern', v); } catch (_) {}
        const sel = document.getElementById('interval-pattern');
        if (sel && sel.value !== v) sel.value = v;
        repaintFretboard(lastPaintedBarIdx, lastActiveNotes);
        updateKeyStrip();
    }
    window.setIntervalPattern = setIntervalPattern;
    try {
        const saved = localStorage.getItem('alphaTab.intervalPattern');
        if (saved) intervalPattern = saved;
    } catch (_) {}
    document.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('interval-pattern');
        if (sel) sel.value = intervalPattern;
    });

    // Paint every diatonic 3rd/6th pair within the active scale.
    //
    // Strategy: for each (hi, lo) string pair and each fret on the lower
    // string that lands on a scale tone, look up the scale-step above
    // (+2 steps for 3rds, +5 for 6ths) and find the fret on the higher
    // string carrying that chroma at a sensible musical distance
    // (semitones in [2, 5] for 3rds, [7, 11] for 6ths).
    function paintIntervalPattern(scaleAscChromas) {
        if (intervalPattern === 'off' || !scaleAscChromas?.length) return;
        const svg = document.querySelector('#fretboard svg');
        if (!svg) return;
        let layer = svg.querySelector('#fb-interval-pairs');
        if (!layer) {
            layer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            layer.setAttribute('id', 'fb-interval-pairs');
            svg.appendChild(layer);
        }
        layer.innerHTML = '';

        const patterns = intervalPattern === 'both' ? ['3rds', '6ths'] : [intervalPattern];

        for (const pat of patterns) {
            const colour = INTERVAL_COLORS[pat];
            const steps = pat === '3rds' ? 2 : 5;   // diatonic interval in scale steps
            const minSemis = pat === '3rds' ? 2 : 7;
            const maxSemis = pat === '3rds' ? 5 : 11;
            for (const { hi, lo } of INTERVAL_STRING_PAIRS[pat]) {
                const loTune = STRING_MIDI_BY_AT[lo];
                const hiTune = STRING_MIDI_BY_AT[hi];
                for (let lf = 0; lf <= FB.frets; lf++) {
                    const loMidi = loTune + lf;
                    const loChroma = loMidi % 12;
                    const loIdx = scaleAscChromas.indexOf(loChroma);
                    if (loIdx < 0) continue;
                    const hiTargetChroma = scaleAscChromas[(loIdx + steps) % scaleAscChromas.length];
                    // Scan a narrow fret window on the higher string for the
                    // target chroma at the right semitone gap.
                    for (let hf = Math.max(0, lf - 4); hf <= Math.min(FB.frets, lf + 6); hf++) {
                        const hiMidi = hiTune + hf;
                        const semis = hiMidi - loMidi;
                        if (semis < minSemis || semis > maxSemis) continue;
                        if (hiMidi % 12 !== hiTargetChroma) continue;
                        paintIntervalPair(hi, hf, lo, lf, colour, layer);
                        break; // one pair per lower-string fret
                    }
                }
            }
        }
    }

    function paintIntervalPair(hiStr, hiFret, loStr, loFret, colour, layer) {
        const hiMapped = FB.strings - hiStr + 1;
        const loMapped = FB.strings - loStr + 1;
        const hiDot = fbDotMap.get(`${hiMapped}-${hiFret}`);
        const loDot = fbDotMap.get(`${loMapped}-${loFret}`);
        if (!hiDot || !loDot) return;
        for (const dot of [hiDot, loDot]) {
            const fill = dot.getAttribute('fill');
            if (!fill || fill === 'transparent') {
                dot.setAttribute('fill', colour);
                dot.setAttribute('r', '5.5');
                dot.style.opacity = '0.9';
            }
            dot.setAttribute('stroke', colour);
            dot.setAttribute('stroke-width', '1.5');
        }
        const x1 = parseFloat(hiDot.getAttribute('cx'));
        const y1 = parseFloat(hiDot.getAttribute('cy'));
        const x2 = parseFloat(loDot.getAttribute('cx'));
        const y2 = parseFloat(loDot.getAttribute('cy'));
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', colour);
        line.setAttribute('stroke-width', '1.5');
        line.setAttribute('stroke-opacity', '0.55');
        line.setAttribute('stroke-linecap', 'round');
        layer.appendChild(line);
    }

    // ─────────────────────────────────────────────────────────────────────
    // KEY DETECTION + ROMAN NUMERAL STRIP
    // ─────────────────────────────────────────────────────────────────────
    // Map alphaTab's keySignature (-7..+7 = flats/sharps) to a major
    // tonic; then check the first chord in the score to decide major vs
    // its relative minor.
    const KS_TO_MAJOR_TONIC = {
        '-7': 'Cb', '-6': 'Gb', '-5': 'Db', '-4': 'Ab', '-3': 'Eb', '-2': 'Bb', '-1': 'F',
        '0': 'C',
        '1': 'G', '2': 'D', '3': 'A', '4': 'E', '5': 'B', '6': 'F#', '7': 'C#',
    };

    function findFirstChordSymbol(score) {
        for (const track of (score?.tracks || [])) {
            for (const staff of (track.staves || [])) {
                for (const bar of (staff.bars || [])) {
                    for (const voice of (bar.voices || [])) {
                        for (const beat of (voice.beats || [])) {
                            if (beat.chord?.name) return beat.chord.name;
                            const n0 = beat.notes?.[0];
                            if (n0 && Number.isFinite(n0.realValue)) return null; // bail to caller
                        }
                    }
                }
            }
        }
        return null;
    }

    function detectSongKey(score) {
        const ks = score?.masterBars?.[0]?.keySignature;
        const majorTonic = KS_TO_MAJOR_TONIC[String(ks)] ?? 'C';
        const firstChord = findFirstChordSymbol(score);
        if (firstChord) {
            const c = Tonal.Chord.get(firstChord);
            const t = (c?.type || '').toLowerCase();
            if (/minor|m7b5|half|diminished/.test(t) && c.tonic) {
                return { tonic: c.tonic, mode: 'minor' };
            }
        }
        // Default: assume major from the key signature.
        return { tonic: majorTonic, mode: 'major' };
    }

    const ROMAN_MAJOR = ['I','♭II','II','♭III','III','IV','♭V','V','♭VI','VI','♭VII','VII'];
    const ROMAN_MINOR = ['i','♭II','ii','III','♯III','iv','♭V','v','VI','♯vi','VII','♯vii'];

    function chordToRoman(chordSymbol, key) {
        if (!key || !chordSymbol || typeof Tonal === 'undefined') return '';
        const c = Tonal.Chord.get(chordSymbol);
        if (c.empty || !c.tonic) return '';
        const tonicPc = Tonal.Note.get(key.tonic).chroma;
        const chordPc = Tonal.Note.get(c.tonic).chroma;
        if (tonicPc == null || chordPc == null) return '';
        const interval = ((chordPc - tonicPc) % 12 + 12) % 12;
        let roman = (key.mode === 'minor' ? ROMAN_MINOR : ROMAN_MAJOR)[interval];
        const t = (c.type || '').toLowerCase();
        // Adjust case for chord quality.
        if (/minor|m7b5|half|diminished/.test(t)) roman = roman.toLowerCase();
        else if (/major|dominant|augmented/.test(t)) roman = roman.toUpperCase();
        // Suffix.
        if (/dominant/.test(t))   roman += '7';
        else if (/half|m7b5/.test(t)) roman += 'ø7';
        else if (/diminished seventh/.test(t)) roman += '°7';
        else if (/diminished/.test(t))         roman += '°';
        else if (/augmented/.test(t))          roman += '+';
        else if (/major seventh/.test(t))      roman += 'M7';
        else if (/minor seventh/.test(t))      roman += '7';
        else if (/major sixth/.test(t))        roman += '6';
        return roman;
    }

    function updateKeyStrip() {
        const el = document.getElementById('key-strip');
        if (!el) return;
        const parts = [];
        if (songKey) {
            parts.push(`<span class="ks-key">Key:</span> ${songKey.tonic} ${songKey.mode}`);
        }
        if (activeChordName) {
            const rn = chordToRoman(activeChordName, songKey);
            parts.push(`<span class="ks-now">Now:</span> ${activeChordName}` + (rn ? ` <span class="ks-rom">(${rn})</span>` : ''));
        }
        if (overlayMode === 'scale' && activeChordName && typeof Tonal !== 'undefined') {
            const c = Tonal.Chord.get(activeChordName);
            if (!c.empty) {
                const sn = chordToScaleName(c, scaleFlavour);
                parts.push(`<span class="ks-key">Scale:</span> ${c.tonic} ${sn}` + (scaleBox !== 'all' ? ` · Pos ${scaleBox}` : ''));
            }
        }
        if (intervalPattern !== 'off') {
            parts.push(`<span class="ks-rom">Intervals:</span> ${intervalPattern}`);
        }
        el.innerHTML = parts.join(' &nbsp;·&nbsp; ') || '—';
    }

    function toggleTheory() {
        overlayMode = overlayMode === 'off'  ? 'arp'
                    : overlayMode === 'arp'  ? 'scale'
                    : 'off';
        const btn = document.getElementById('btn-theory');
        if (btn) {
            btn.classList.toggle('on', overlayMode !== 'off');
            btn.textContent = overlayMode === 'off'   ? '🎓 THEORY'
                            : overlayMode === 'arp'   ? '🎓 ARP'
                            : '🎓 SCALE';
        }
        repaintFretboard(lastPaintedBarIdx, lastActiveNotes);
        updateKeyStrip();
    }
    window.toggleTheory = toggleTheory;

    // ─────────────────────────────────────────────────────────────────────
    // VOICINGS POPOVER
    // ─────────────────────────────────────────────────────────────────────
    // Tap the chord label to open a small overlay with 2-4 alternative
    // voicings for the active chord. Each voicing is a transposable shape
    // from a hand-rolled library; clicking plays the chord through a
    // simple Web Audio synth and briefly paints it on the main fretboard
    // until the next playedBeatChanged fires.
    //
    // Shapes are array-of-6 fret offsets relative to a root fret on a
    // particular root string (alphaTab convention: s1 = high E … s6 = low
    // E). Index 0 → s6 (low E), index 5 → s1 (high E). null = mute.
    const VOICING_SHAPES = {
        'M':    [{ name: 'E-shape',     rs: 6, frets: [0, 2, 2, 1, 0, 0] },
                 { name: 'A-shape',     rs: 5, frets: [null, 0, 2, 2, 2, 0] }],
        'm':    [{ name: 'Em-shape',    rs: 6, frets: [0, 2, 2, 0, 0, 0] },
                 { name: 'Am-shape',    rs: 5, frets: [null, 0, 2, 2, 1, 0] }],
        '7':    [{ name: 'E7-shape',    rs: 6, frets: [0, 2, 0, 1, 0, 0] },
                 { name: 'A7-shape',    rs: 5, frets: [null, 0, 2, 0, 2, 0] }],
        'm7':   [{ name: 'Em7-shape',   rs: 6, frets: [0, 2, 0, 0, 0, 0] },
                 { name: 'Am7-shape',   rs: 5, frets: [null, 0, 2, 0, 1, 0] }],
        'maj7': [{ name: 'Emaj7-shape', rs: 6, frets: [0, 2, 1, 1, 0, 0] },
                 { name: 'Amaj7-shape', rs: 5, frets: [null, 0, 2, 1, 2, 0] }],
        'dim':  [{ name: 'dim',         rs: 5, frets: [null, 0, 1, 2, 1, null] }],
        'dim7': [{ name: 'dim7',        rs: 5, frets: [null, 0, 1, 2, 1, 2] }],
        'aug':  [{ name: 'aug',         rs: 5, frets: [null, 0, 3, 2, 2, 1] }],
        'm7b5': [{ name: 'm7b5',        rs: 5, frets: [null, 0, 1, 0, 1, null] }],
        'sus4': [{ name: 'sus4 E',      rs: 6, frets: [0, 2, 2, 2, 0, 0] }],
        'sus2': [{ name: 'sus2 A',      rs: 5, frets: [null, 0, 2, 4, 0, 0] }],
    };
    const VOICING_QUALITIES = ['','m','7','m7','maj7','dim','dim7','aug','sus4','sus2'];

    function chordQualityKeyForVoicing(c) {
        const t = (c?.type || '').toLowerCase();
        if (/half|m7b5/.test(t))                 return 'm7b5';
        if (/diminished seventh/.test(t))        return 'dim7';
        if (/diminished/.test(t))                return 'dim';
        if (/augmented/.test(t))                 return 'aug';
        if (/dominant/.test(t))                  return '7';
        if (/major seventh|major ninth|major thirteenth/.test(t)) return 'maj7';
        if (/minor seventh|minor ninth/.test(t)) return 'm7';
        if (/minor/.test(t))                     return 'm';
        if (/suspended fourth/.test(t))          return 'sus4';
        if (/suspended second/.test(t))          return 'sus2';
        return 'M';
    }

    function computeVoicing(symbol, shape) {
        if (typeof Tonal === 'undefined') return null;
        const c = Tonal.Chord.get(symbol);
        if (c.empty || !c.tonic) return null;
        const rootPc = Tonal.Note.get(c.tonic).chroma;
        if (rootPc == null) return null;
        const rsMidi = STRING_MIDI_BY_AT[shape.rs];
        const rootFret = ((rootPc - (rsMidi % 12)) % 12 + 12) % 12;
        const out = [];
        for (let i = 0; i < 6; i++) {
            const string = 6 - i;  // i=0 → s6, i=5 → s1
            const offset = shape.frets[i];
            if (offset == null) out.push({ string, fret: null });
            else out.push({ string, fret: rootFret + offset });
        }
        return out;
    }

    // Render a small chord diagram. Top row = low E to match the main
    // fretboard's "tab view" orientation.
    function renderVoicingDiagram(positions, label) {
        const played = positions.filter(p => p.fret !== null && p.fret > 0).map(p => p.fret);
        const minF = played.length ? Math.max(0, Math.min(...played) - 1) : 0;
        const maxF = played.length ? Math.max(minF + 4, Math.max(...played) + 1) : 4;
        const span = Math.max(4, maxF - minF);
        const w = 84, h = 78, padTop = 14, padLeft = 12, padRight = 8, padBottom = 12;
        const fw = (w - padLeft - padRight) / span;
        const sg = (h - padTop - padBottom) / 5;
        const parts = [`<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}">`];
        for (let s = 0; s < 6; s++) {
            const y = padTop + s * sg;
            parts.push(`<line x1="${padLeft}" y1="${y}" x2="${w-padRight}" y2="${y}" stroke="#d8d8d8" stroke-width="0.6"/>`);
        }
        const nutThick = minF === 0 ? 2 : 0.6;
        for (let i = 0; i <= span; i++) {
            const x = padLeft + i * fw;
            parts.push(`<line x1="${x}" y1="${padTop}" x2="${x}" y2="${h-padBottom}" stroke="#a89070" stroke-width="${i === 0 ? nutThick : 0.6}"/>`);
        }
        if (minF > 0) parts.push(`<text x="${padLeft - 2}" y="${padTop + 4}" font-size="8" fill="#94a3b8" text-anchor="end">${minF + 1}</text>`);
        for (const p of positions) {
            // p.string 6 → top row (low E), p.string 1 → bottom row (high E).
            const row = 6 - p.string;
            const y = padTop + row * sg;
            if (p.fret === null) {
                parts.push(`<text x="${padLeft - 5}" y="${y + 3}" font-size="9" fill="#94a3b8" text-anchor="middle">×</text>`);
            } else if (p.fret === 0) {
                parts.push(`<circle cx="${padLeft - 5}" cy="${y}" r="3" fill="none" stroke="#fff" stroke-width="1"/>`);
            } else {
                const fi = p.fret - minF;
                const cx = padLeft + (fi - 0.5) * fw;
                parts.push(`<circle cx="${cx}" cy="${y}" r="4" fill="#e94560" stroke="#fff" stroke-width="0.8"/>`);
            }
        }
        if (label) parts.push(`<text x="${w/2}" y="${h - 2}" font-size="8" fill="#94a3b8" text-anchor="middle">${label}</text>`);
        parts.push('</svg>');
        return parts.join('');
    }

    // Strum a voicing via Web Audio (sawtooth + lowpass + per-note envelope).
    let vpAudioCtx = null;
    function vpAudio() {
        if (!vpAudioCtx) {
            const Ctor = window.AudioContext || window.webkitAudioContext;
            if (!Ctor) return null;
            vpAudioCtx = new Ctor();
        }
        if (vpAudioCtx.state === 'suspended') vpAudioCtx.resume();
        return vpAudioCtx;
    }
    function playVoicing(positions) {
        const ctx = vpAudio();
        if (!ctx) return;
        const order = [...positions]
            .filter(p => p.fret !== null)
            .sort((a, b) => b.string - a.string);  // low to high
        const now = ctx.currentTime + 0.02;
        order.forEach((p, i) => {
            const midi = STRING_MIDI_BY_AT[p.string] + p.fret;
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            const t0 = now + i * 0.014;
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.value = freq;
            const gain = ctx.createGain();
            gain.gain.setValueAtTime(0, t0);
            gain.gain.linearRampToValueAtTime(0.14, t0 + 0.005);
            gain.gain.exponentialRampToValueAtTime(0.001, t0 + 1.5);
            const lp = ctx.createBiquadFilter();
            lp.type = 'lowpass'; lp.frequency.value = 2400; lp.Q.value = 0.4;
            osc.connect(lp); lp.connect(gain); gain.connect(ctx.destination);
            osc.start(t0); osc.stop(t0 + 1.6);
        });
    }

    function paintVoicingPreview(positions) {
        fbDotMap.forEach(el => {
            el.getAnimations().forEach(a => a.cancel());
            el.setAttribute('fill', 'transparent');
            el.setAttribute('stroke', 'transparent');
            el.setAttribute('r', '5.5');
            el.style.opacity = '';
        });
        fbTxtMap.forEach(el => { el.style.opacity = '0'; el.textContent = ''; });
        for (const p of positions) {
            if (p.fret == null) continue;
            const mapped = FB.strings - p.string + 1;
            const el = fbDotMap.get(`${mapped}-${p.fret}`);
            if (el) {
                el.setAttribute('fill', '#e94560');
                el.setAttribute('stroke', '#fff');
                el.setAttribute('stroke-width', '1.5');
                el.setAttribute('r', '7.5');
                el.style.opacity = '1';
            }
        }
    }

    let vpQualityOverride = null;
    function openVoicings(symbolOverride) {
        const base = (symbolOverride || activeChordName || '').replace(/[^A-G#b]/g, '');
        if (!base) return;
        const pop = document.getElementById('voicings-popover');
        if (!pop) return;
        // Effective symbol = root + quality override (or original quality).
        const sym = vpQualityOverride != null
            ? base + vpQualityOverride
            : (symbolOverride || activeChordName);
        const c = (typeof Tonal !== 'undefined') ? Tonal.Chord.get(sym) : null;
        const qKey = c && !c.empty ? chordQualityKeyForVoicing(c) : 'M';

        document.getElementById('vp-title').textContent = sym;
        document.getElementById('vp-quality').textContent = c?.type ? `(${c.type})` : '';

        const qRow = document.getElementById('vp-quality-row');
        qRow.innerHTML = '';
        for (const q of VOICING_QUALITIES) {
            const b = document.createElement('button');
            b.className = 'vp-q' + (q === (vpQualityOverride ?? '') ? ' on' : '');
            b.textContent = base + q;
            b.onclick = () => { vpQualityOverride = q; openVoicings(); };
            qRow.appendChild(b);
        }

        const shapes = VOICING_SHAPES[qKey] || VOICING_SHAPES['M'];
        const wrap = document.getElementById('vp-shapes');
        wrap.innerHTML = '';
        for (const shape of shapes) {
            const positions = computeVoicing(sym, shape);
            if (!positions) continue;
            const btn = document.createElement('button');
            btn.className = 'vp-item';
            btn.innerHTML = renderVoicingDiagram(positions, shape.name);
            btn.onclick = () => { playVoicing(positions); paintVoicingPreview(positions); };
            wrap.appendChild(btn);
        }
        pop.classList.add('open');
        pop.setAttribute('aria-hidden', 'false');
    }
    function closeVoicings() {
        const pop = document.getElementById('voicings-popover');
        if (pop) { pop.classList.remove('open'); pop.setAttribute('aria-hidden', 'true'); }
        vpQualityOverride = null;
    }
    window.closeVoicings = closeVoicings;
    document.addEventListener('click', (e) => {
        const pop = document.getElementById('voicings-popover');
        if (!pop || !pop.classList.contains('open')) return;
        if (pop.contains(e.target)) return;
        if (e.target.closest('#fb-chord-label')) return;
        closeVoicings();
    });

    const chordLabelBtn = document.getElementById('fb-chord-label');
    if (chordLabelBtn) {
        chordLabelBtn.onclick = (e) => {
            e.stopPropagation();
            if (!activeChordName) return;
            vpQualityOverride = null;
            openVoicings();
        };
    }

    function repaintFretboard(barIdx, activeNotes) {
        lastPaintedBarIdx = barIdx;
        lastActiveNotes = activeNotes;

        fbDotMap.forEach(el => {
            el.getAnimations().forEach(a => a.cancel());
            el.setAttribute('fill', 'transparent');
            el.setAttribute('stroke', 'transparent');
            el.setAttribute('r', '5.5');
            el.style.opacity = '';
        });
        fbTxtMap.forEach(el => {
            el.style.opacity = '0';
            el.textContent = '';
        });
        const badgeLayer = document.getElementById('fb-badges');
        if (badgeLayer) badgeLayer.replaceChildren();

        if (overlayMode !== 'off' && activeChordName && typeof Tonal !== 'undefined') {
            const chordData = Tonal.Chord.get(activeChordName);
            if (!chordData.empty) {
                const chordChromas = chordData.notes.map(n => Tonal.Note.chroma(n));
                let scaleChromas = [], scaleIntervals = [];
                let boxWindows = null;
                if (overlayMode === 'scale' && chordData.tonic) {
                    const scaleName = chordToScaleName(chordData, scaleFlavour);
                    const scaleData = Tonal.Scale.get(`${chordData.tonic} ${scaleName}`);
                    if (!scaleData.empty) {
                        scaleChromas = scaleData.notes.map(n => Tonal.Note.chroma(n));
                        scaleIntervals = scaleData.intervals;
                    }
                    // Box restriction anchors on the SONG key tonic if
                    // known (so the box stays put across chord changes);
                    // falls back to the current chord's root.
                    const anchorPc = songKey
                        ? Tonal.Note.get(songKey.tonic).chroma
                        : Tonal.Note.get(chordData.tonic).chroma;
                    boxWindows = scaleBoxWindow(anchorPc, scaleBox);
                }
                const inBox = (fret) => !boxWindows || boxWindows.some(([lo, hi]) => fret >= lo && fret <= hi);

                for (let s = 1; s <= FB.strings; s++) {
                    for (let f = 0; f <= FB.frets; f++) {
                        const midi = standardTuningMidi[s - 1] + f;
                        const chroma = midi % 12;
                        const chordIdx = chordChromas.indexOf(chroma);
                        const scaleIdx = scaleChromas.indexOf(chroma);
                        const key = `${s}-${f}`;
                        const dot = fbDotMap.get(key);
                        const txt = fbTxtMap.get(key);
                        if (!dot || !txt) continue;
                        // Chord tones always paint (so the user can find
                        // them anywhere on the neck). Scale tones only
                        // paint inside the selected box.
                        if (chordIdx !== -1) {
                            const ivl = chordData.intervals[chordIdx];
                            dot.setAttribute('fill', getIntervalColor(ivl));
                            dot.setAttribute('r', '6');
                            txt.textContent = ivl.replace(/M|m|P|d|A/g, '');
                            txt.style.opacity = '1';
                        } else if (scaleIdx !== -1 && inBox(f)) {
                            dot.setAttribute('fill', 'rgba(20, 184, 166, 0.40)');
                            dot.setAttribute('r', '5');
                            txt.textContent = (scaleIntervals[scaleIdx] || '').replace(/M|m|P|d|A/g, '');
                            txt.style.opacity = '0.75';
                        }
                    }
                }
            }
        }

        // Related-chord overlay: pink stroke around every (string,fret)
        // that's a chord tone of a related chord (V7→dim7 sub, etc).
        // Runs after the main overlay so it can preserve existing fills.
        if (showRelated && activeChordName && typeof Tonal !== 'undefined') {
            const cd = Tonal.Chord.get(activeChordName);
            const rels = relatedChordSymbols(cd);
            const relChromas = new Set();
            for (const sym of rels) {
                const rd = Tonal.Chord.get(sym);
                if (!rd.empty) for (const n of rd.notes) {
                    const c = Tonal.Note.get(n).chroma;
                    if (c != null) relChromas.add(c);
                }
            }
            if (relChromas.size) {
                for (let s = 1; s <= FB.strings; s++) {
                    for (let f = 0; f <= FB.frets; f++) {
                        const midi = standardTuningMidi[s - 1] + f;
                        if (!relChromas.has(midi % 12)) continue;
                        const dot = fbDotMap.get(`${s}-${f}`);
                        if (!dot) continue;
                        dot.setAttribute('stroke', '#ec4899');
                        dot.setAttribute('stroke-width', '2');
                        const fill = dot.getAttribute('fill');
                        if (!fill || fill === 'transparent') {
                            dot.setAttribute('fill', 'rgba(236, 72, 153, 0.18)');
                            dot.setAttribute('r', '5.5');
                        }
                    }
                }
            }
        }

        // Note-name overlay: replace interval labels with absolute pitch
        // names on every fret position. Highlighted dots keep full
        // opacity; empty positions render the name at low opacity as a
        // fretboard-memorisation aid.
        if (showNoteNames) {
            for (let s = 1; s <= FB.strings; s++) {
                for (let f = 0; f <= FB.frets; f++) {
                    const midi = standardTuningMidi[s - 1] + f;
                    const dot = fbDotMap.get(`${s}-${f}`);
                    const txt = fbTxtMap.get(`${s}-${f}`);
                    if (!dot || !txt) continue;
                    txt.textContent = NOTE_NAMES_SHARP[midi % 12];
                    const fill = dot.getAttribute('fill');
                    const lit = fill && fill !== 'transparent';
                    txt.style.opacity = lit ? '1' : '0.30';
                }
            }
        }

        // Interval pattern overlay (3rds / 6ths). Works independently of
        // the scale/arp overlay. Scale source preference:
        //   1. parent scale of the active chord (using current flavour)
        //   2. fallback to the detected song key (Aeolian for minor, major
        //      otherwise) so the pattern still draws before any chord
        //      symbol has been seen.
        if (intervalPattern !== 'off' && typeof Tonal !== 'undefined') {
            let scaleChromas = null;
            if (activeChordName) {
                const cd = Tonal.Chord.get(activeChordName);
                if (!cd.empty && cd.tonic) {
                    const sData = Tonal.Scale.get(`${cd.tonic} ${chordToScaleName(cd, scaleFlavour)}`);
                    if (!sData.empty) scaleChromas = sData.notes.map(n => Tonal.Note.chroma(n));
                }
            }
            if (!scaleChromas && songKey?.tonic) {
                const sName = songKey.mode === 'minor' ? 'aeolian' : 'major';
                const sData = Tonal.Scale.get(`${songKey.tonic} ${sName}`);
                if (!sData.empty) scaleChromas = sData.notes.map(n => Tonal.Note.chroma(n));
            }
            if (scaleChromas) paintIntervalPattern(scaleChromas);
        } else {
            // Clean stale pair lines when pattern is turned off.
            const svg = document.querySelector('#fretboard svg');
            const layer = svg?.querySelector('#fb-interval-pairs');
            if (layer) layer.innerHTML = '';
        }

        const barSet = barNotesMap?.get(barIdx);
        if (barSet) {
            barSet.forEach(key => {
                const el = fbDotMap.get(key);
                if (el) {
                    if (overlayMode !== 'off' && activeChordName) {
                        el.setAttribute('stroke', 'rgba(255,255,255,0.9)');
                        el.setAttribute('stroke-width', '1.5');
                    } else {
                        el.setAttribute('fill', 'rgba(255,255,255,0.85)');
                        el.setAttribute('stroke', '#1a120c');
                    }
                }
            });
        }

        const FADE_DUR_MS = 1500;
        const MIN_OPACITY = 0.32;
        if (activeNotes) {
            for (const note of activeNotes) {
                const mappedString = FB.strings - note.string + 1;
                const key = `${mappedString}-${note.fret}`;
                const el = fbDotMap.get(key);
                const txt = fbTxtMap.get(key);
                if (el) {
                    const fresh = !!note.__fbFresh;
                    const elapsed = Math.max(0, (note.__fbCurrentMs || 0) - (note.__fbStrikeMs || 0));
                    const startOp = fresh
                        ? 1
                        : Math.max(MIN_OPACITY, 1 - (elapsed / FADE_DUR_MS) * (1 - MIN_OPACITY));

                    el.setAttribute('fill', '#e94560');
                    el.setAttribute('stroke', '#fff');
                    el.setAttribute('stroke-width', '1.5');
                    el.setAttribute('r', '7.5');
                    el.style.opacity = String(startOp);

                    if (fresh) {
                        // Snap-on attack: brief size pulse, then slow fade.
                        el.animate([
                            { r: 11, opacity: 1, offset: 0 },
                            { r: 7.5, opacity: 1, offset: 0.08 },
                            { r: 7.5, opacity: MIN_OPACITY, offset: 1 }
                        ], { duration: FADE_DUR_MS, easing: 'ease-out', fill: 'forwards' });
                    } else {
                        // Continue the fade from where it should be now.
                        const remaining = FADE_DUR_MS - elapsed;
                        if (remaining > 50) {
                            el.animate([
                                { opacity: startOp },
                                { opacity: MIN_OPACITY }
                            ], { duration: remaining, easing: 'linear', fill: 'forwards' });
                        }
                    }
                    applyEffectAnims(el, note, prevActiveNotes);
                }
                if (txt) txt.style.opacity = '0';

                if (badgeLayer && el) {
                    const cx = parseFloat(el.getAttribute('cx'));
                    const cy = parseFloat(el.getAttribute('cy'));
                    const badges = ornamentBadges(note);
                    badges.forEach((b, i) => {
                        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                        t.textContent = b.text;
                        t.setAttribute('x', cx + 9);
                        t.setAttribute('y', cy - 5 - i * 9);
                        t.setAttribute('text-anchor', 'start');
                        t.setAttribute('font-size', '8.5');
                        t.setAttribute('font-weight', '700');
                        t.setAttribute('fill', b.fill);
                        t.setAttribute('font-family', 'sans-serif');
                        t.setAttribute('paint-order', 'stroke');
                        t.setAttribute('stroke', '#1a120c');
                        t.setAttribute('stroke-width', '2');
                        badgeLayer.appendChild(t);
                    });
                }
            }
        }
        prevActiveNotes = activeNotes;

        const blabel = document.getElementById('fb-bar-label');
        if (blabel && barIdx >= 0) blabel.textContent = 'BAR ' + (barIdx + 1);
        
        const clabel = document.getElementById('fb-chord-label');
        if(clabel) clabel.textContent = activeChordName || "";
    }

    function playClick(accent) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = accent ? 1500 : 1000;
        osc.type = 'square';
        const t = audioCtx.currentTime;
        gain.gain.setValueAtTime(0.25, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
        osc.start(t); osc.stop(t + 0.05);
    }

    async function startPlayback() {
        if (audioCtx.state !== 'running') audioCtx.resume();
        if (api?.playerState === 1) { api.playPause(); return; }
        if (!isCountInOn) { api.playPause(); return; }

        const tempo = scoreRef?.masterBars?.[0]?.tempoAutomations?.[0]?.value || scoreRef?.tempo || 120;
        const beats = scoreRef?.masterBars?.[0]?.timeSignatureNumerator || 4;
        const beatMs = 60000 / tempo / currentSpeed;

        for (let i = 0; i < beats; i++) {
            playClick(i === 0);
            await new Promise(r => setTimeout(r, beatMs));
        }
        api.playPause();
    }

            };

    let wakeLock = null;
    async function acquireWakeLock() {
        if (!('wakeLock' in navigator)) return;
        try {
            if (wakeLock) return;
            wakeLock = await navigator.wakeLock.request('screen');
            wakeLock.addEventListener('release', () => { wakeLock = null; });
        } catch (e) { log("wakeLock request failed: " + e.message); }
    }
    function releaseWakeLock() {
        if (!wakeLock) return;
        try { wakeLock.release(); } catch(e) {}
        wakeLock = null;
    }
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && api?.playerState === 1) {
            acquireWakeLock();

    });

    function syncStorageKey() {
        if (!scoreFileKey) return null;
        return 'at-sync:' + scoreFileKey + (uploadedMp3Key ? '|mp3=' + uploadedMp3Key : '');
