    function persistSync() {
        const key = syncStorageKey();
        if (!key) return;
        try { localStorage.setItem(key, String(syncOffsetMs)); } catch(e) {}
    }
    function restoreSync() {
        const key = syncStorageKey();
        if (!key) return false;
        try {
            const v = localStorage.getItem(key);
            if (v !== null) {
                syncOffsetMs = parseInt(v, 10) || 0;
                const sign = syncOffsetMs > 0 ? '+' : '';
                const disp = document.getElementById('sync-display');
                if(disp) disp.textContent = sign + syncOffsetMs + ' ms';

    function clearAlignment() {
        alignmentActive = false;
        warpByAudio = [];
        warpByScore = [];
        const b = document.getElementById('btn-align');
        if (b) b.classList.remove('on');
    }

    function applyWarpPath(path) {
        if (!Array.isArray(path) || path.length < 2) {
            clearAlignment();
            return;
        }
        // Backend emits [score_sec, audio_sec] pairs.
        warpByAudio = path.map(([s, a]) => ({ a, s })).sort((x, y) => x.a - y.a);
        warpByScore = [...warpByAudio].sort((x, y) => x.s - y.s);
        alignmentActive = true;
        const b = document.getElementById('btn-align');
        if (b) b.classList.add('on');
        log(`Alignment active — ${warpByAudio.length} warp points`);
    }

    function bsearchLE(arr, key, field) {
        let lo = 0, hi = arr.length;
        while (lo < hi) {
            const mid = (lo + hi) >>> 1;
            if (arr[mid][field] <= key) lo = mid + 1;
            else hi = mid;
        }
        return lo - 1;
    }

    function audioSecToScoreMs(audioSec) {
        if (!alignmentActive || warpByAudio.length < 2) {
            return audioSec * 1000 + syncOffsetMs;
        }
        let i = bsearchLE(warpByAudio, audioSec, 'a');
        if (i < 0) return warpByAudio[0].s * 1000 + syncOffsetMs;
        if (i >= warpByAudio.length - 1) return warpByAudio[warpByAudio.length - 1].s * 1000 + syncOffsetMs;
        const lo = warpByAudio[i], hi = warpByAudio[i + 1];
        const dt = Math.max(1e-6, hi.a - lo.a);
        const t = (audioSec - lo.a) / dt;
        return (lo.s + t * (hi.s - lo.s)) * 1000 + syncOffsetMs;
    }

    function scoreMsToAudioSec(scoreMs) {
        if (!alignmentActive || warpByScore.length < 2) {
            return Math.max(0, (scoreMs - syncOffsetMs) / 1000);
        }
        const scoreSec = (scoreMs - syncOffsetMs) / 1000;
        let i = bsearchLE(warpByScore, scoreSec, 's');
        if (i < 0) return warpByScore[0].a;
        if (i >= warpByScore.length - 1) return warpByScore[warpByScore.length - 1].a;
        const lo = warpByScore[i], hi = warpByScore[i + 1];
        const dt = Math.max(1e-6, hi.s - lo.s);
        const t = (scoreSec - lo.s) / dt;
        return lo.a + t * (hi.a - lo.a);
    }

    function waitForScoreLoaded() {

    // Submit multipart form to submitUrl, then poll /align-jobs/{id} every
    // 3s until state is done/error. Returns the AlignResponse on success.
    async function submitAndPoll(submitUrl, fd) {
        const submit = await fetch(submitUrl, { method: 'POST', body: fd });
        if (!submit.ok) {
            const t = await submit.text();
            throw new Error(`submit ${submit.status}: ${t.slice(0, 200)}`);
        }
        const { job_id } = await submit.json();
        if (!job_id) throw new Error('Backend did not return a job_id.');

        while (true) {
            await new Promise(r => setTimeout(r, 3000));
            let resp;
            try {
                resp = await fetch(`${ALIGN_API_URL}/align-jobs/${job_id}`);
            } catch (e) {
                setStatus(`Poll failed (retrying): ${e.message}`, 'err');
                continue;
            }
            if (!resp.ok) {
                const t = await resp.text();
                throw new Error(`poll ${resp.status}: ${t.slice(0, 200)}`);
            }
            const j = await resp.json();
            const secs = Math.round(j.elapsed_sec);
            if (j.state === 'done') {
                setStatus(`Job done (${secs}s): ${j.message}`);
                return j.result;
            }
            if (j.state === 'error') {
                throw new Error(`${j.error || 'unknown'} (after ${secs}s)`);
            }
            setStatus(`[${secs}s] ${j.message}`);
        }
    }

    // ─────────────────────────────────────────────────────────────────────
    // SURF EFFECT CHAIN (tilt EQ → tremolo → spring reverb)
    // ─────────────────────────────────────────────────────────────────────
    // alphaTab's internal synth connects directly to AudioContext.destination,
    // so to insert effects we patch the destination getter to return our
    // chain's input node. The patch must be applied BEFORE alphaTab is
    // constructed. AudioContexts created later (e.g. by ad-hoc code) also
    // route through the chain, which is fine in this app.
    let surfEnabled = true;
    const surfNodes = [];

    function makeSpringIR(ctx) {
        const sr = ctx.sampleRate;
        const length = Math.floor(sr * 1.4);
        const ir = ctx.createBuffer(2, length, sr);
        for (let ch = 0; ch < 2; ch++) {
            const d = ir.getChannelData(ch);
            for (let i = 0; i < length; i++) {
                const t = i / sr;
                const decay = Math.exp(-t * 2.2);
                // Springy resonances + decaying noise = recognisable spring tank.
                const r1 = Math.sin(2 * Math.PI * 220 * t) * 0.30;
                const r2 = Math.sin(2 * Math.PI * 440 * t) * 0.18;
                const r3 = Math.sin(2 * Math.PI * 1020 * t) * 0.10;
                const noise = (Math.random() * 2 - 1) * 0.55;
                d[i] = decay * (noise + r1 + r2 + r3) * 0.5;
            }
        }
        return ir;
    }

    function buildSurfChain(ctx) {
        const dest = ctx.destination;
        const input = ctx.createGain();
        const bypass = ctx.createGain();
        bypass.gain.value = 0;

        const lo = ctx.createBiquadFilter();
        lo.type = 'lowshelf'; lo.frequency.value = 220; lo.gain.value = -2;
        const hi = ctx.createBiquadFilter();
        hi.type = 'highshelf'; hi.frequency.value = 3000; hi.gain.value = 4;

        const trem = ctx.createGain();
        trem.gain.value = 0.55;
        const lfo = ctx.createOscillator();
        lfo.type = 'sine'; lfo.frequency.value = 5.5;
        const lfoDepth = ctx.createGain();
        lfoDepth.gain.value = 0.45;
        lfo.connect(lfoDepth); lfoDepth.connect(trem.gain);
        try { lfo.start(); } catch (_) {}

        const conv = ctx.createConvolver();
        conv.buffer = makeSpringIR(ctx);
        const wet = ctx.createGain(); wet.gain.value = 0.30;
        const dry = ctx.createGain(); dry.gain.value = 0.85;

        // Effect path: input → lo → hi → trem → [dry → dest, conv → wet → dest]
        // Bypass path: input → bypass → dest (mixed in/out via gain)
        input.connect(lo); lo.connect(hi); hi.connect(trem);
        trem.connect(dry); dry.connect(dest);
        trem.connect(conv); conv.connect(wet); wet.connect(dest);
        input.connect(bypass); bypass.connect(dest);

        const setEnabled = (on) => {
            const t = ctx.currentTime;
            const ramp = 0.05;
            (on ? dry : bypass).gain.setTargetAtTime(0.85, t, ramp);
            (on ? bypass : dry).gain.setTargetAtTime(0,    t, ramp);
            wet.gain.setTargetAtTime(on ? 0.30 : 0, t, ramp);
            trem.gain.setTargetAtTime(on ? 0.55 : 1, t, ramp);
        };
        setEnabled(surfEnabled);

        // Make ctx.destination return our input so any node connecting to
        // destination ends up at the head of the chain.
        try {
            Object.defineProperty(ctx, 'destination', { get: () => input, configurable: true });
        } catch (_) {}

        return { ctx, setEnabled };
    }

    function installSurfPatch() {
        const Orig = window.AudioContext || window.webkitAudioContext;
        if (!Orig || Orig.__surfPatched) return;
        function PatchedCtx(...args) {
            const ctx = Reflect.construct(Orig, args, PatchedCtx);
            try { surfNodes.push(buildSurfChain(ctx)); } catch (e) { console.warn('surf chain failed:', e); }
            return ctx;
        }
        PatchedCtx.prototype = Orig.prototype;
        PatchedCtx.__surfPatched = true;
        window.AudioContext = PatchedCtx;
        if (window.webkitAudioContext) window.webkitAudioContext = PatchedCtx;
    }
    installSurfPatch();

    function toggleSurf() {
        surfEnabled = !surfEnabled;
        for (const n of surfNodes) n.setEnabled(surfEnabled);
        const btn = document.getElementById('btn-surf');
        if (btn) btn.classList.toggle('on', surfEnabled);
    }
    window.toggleSurf = toggleSurf;

    // ─────────────────────────────────────────────────────────────────────
    // PHASE A — BOOT
    // ─────────────────────────────────────────────────────────────────────
    const btnInit = document.getElementById('btn-initialize');
    if (btnInit) {
        btnInit.onclick = async function () {
            this.disabled = true;
            log("Boot gesture received.");

            externalAudio = document.getElementById('external-audio');
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            await audioCtx.resume();
            log("AudioContext: " + audioCtx.state);

            const SILENT_WAV = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=";
            externalAudio.src = SILENT_WAV;
            try {
                const p = externalAudio.play();
                externalAudio.pause();
                externalAudio.currentTime = 0;
                if(p !== undefined) {
                    await p.catch(() => {}); 
                }
            } catch (e) { log("Audio activation skipped: " + e.message); }

            api = new alphaTab.AlphaTabApi(document.getElementById('at-element'), {
                core: { fontDirectory: CDN + 'font/' },
                player: {
                    enablePlayer: true,
                    enableCursor: true,
                    enableUserInteraction: true,
                    soundFont: CDN + 'soundfont/sonivox.sf2',
                    playerMode: alphaTab.PlayerMode.EnabledAutomatic,
                    scrollMode: alphaTab.ScrollMode.Continuous,
                    scrollElement: document.getElementById('main'),
                    scrollOffsetY: -30,
                    scrollSpeed: 300
                }
            });

            wireApiEvents();
            initFretboard();
            wirePinchZoom();

            document.getElementById('startup-screen').style.display = 'none';
            document.getElementById('app').classList.add('ready');
            log("Engine online.");
        };
    }

    // ─────────────────────────────────────────────────────────────────────
    // PINCH-TO-ZOOM 
    // ─────────────────────────────────────────────────────────────────────
    function wirePinchZoom() {
        const main = document.getElementById('main');
        let pinchDist0 = 0;
        let pinchScale0 = 1;
        let pinching = false;

        main.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                pinchDist0 = Math.hypot(dx, dy);
                pinchScale0 = currentZoom;
                pinching = true;
            }
        }, { passive: true });

        main.addEventListener('touchmove', (e) => {
            if (pinching && e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.hypot(dx, dy);
                const next = Math.min(2.0, Math.max(0.5, pinchScale0 * (dist / pinchDist0)));
                main.firstElementChild.style.transformOrigin = '0 0';
                main.firstElementChild.style.transform = 'scale(' + (next / currentZoom).toFixed(3) + ')';
            }
        }, { passive: true });

        main.addEventListener('touchend', () => {
            if (pinching) {
                const t = main.firstElementChild.style.transform;
                const m = t && t.match(/scale\(([\d.]+)\)/);
                main.firstElementChild.style.transform = '';
                if (m) {
                    const factor = parseFloat(m[1]);
                    const target = +(currentZoom * factor).toFixed(2);
                    currentZoom = Math.min(2.0, Math.max(0.5, target));
                    api.settings.display.scale = currentZoom;
                    api.updateSettings();
                    api.render();
                }
                pinching = false;
                pinchDist0 = 0;
            }
        });
    }

    // ─────────────────────────────────────────────────────────────────────
    // PHASE B — Score Load
    // ─────────────────────────────────────────────────────────────────────
    function forceCleanElectricGuitar(score) {
        if (!score?.tracks) return;
        for (const track of score.tracks) {
            if (track.playbackInfo) {
                track.playbackInfo.program = GUITAR_PROGRAM_CLEAN;
                track.playbackInfo.isMute = false;
            }
        }
        try { api.loadMidiForScore(); } catch(e) { log("MIDI regen skipped: " + e.message); }
    }

    function setPlayerMode(modeName) {
        try {
            const modeVal = alphaTab.PlayerMode[modeName];
            if (api.settings.player.playerMode === modeVal) return;
            api.settings.player.playerMode = modeVal;
            api.updateSettings();
            log("PlayerMode → " + modeName);
        } catch (e) { log("setPlayerMode(" + modeName + ") failed: " + e.message); }
    }

    async function loadExternalAudioBytes(bytes, label) {
        try {
            log("Decoding " + label + "...");
            const copy = bytes.buffer.slice(bytes.byteOffset, bytes.byteOffset + bytes.byteLength);
            const decoded = await audioCtx.decodeAudioData(copy);

            log("Encoding WAV...");
            const wavBlob = audioBufferToWavBlob(decoded);
            if (currentWavUrl) URL.revokeObjectURL(currentWavUrl);
            currentWavUrl = URL.createObjectURL(wavBlob);

            externalAudio.src = currentWavUrl;
            await new Promise((res, rej) => {
                externalAudio.addEventListener('loadedmetadata', res, { once: true });
                externalAudio.addEventListener('error', () => rej(new Error("audio load error")), { once: true });
            });

            setPlayerMode('EnabledExternalMedia');
            ensureExternalHandler();

            externalMode = true;
            document.getElementById('mode-pill').classList.add('live');
            document.getElementById('mode-pill').textContent = 'BACKING';
            document.getElementById('btn-play').disabled = false;
            document.getElementById('btn-play').textContent = "▶";
            return true;
        } catch (e) {
            log("Backing track load failed: " + e.message);
            return false;
        }
    }

    function clearExternalAudio() {
        externalMode = false;
        uploadedMp3Key = null;
        try { externalAudio.pause(); } catch(e) {}
        try { externalAudio.removeAttribute('src'); externalAudio.load(); } catch(e) {}
        if (currentWavUrl) { URL.revokeObjectURL(currentWavUrl); currentWavUrl = null; }
        setPlayerMode('EnabledAutomatic');
        document.getElementById('mode-pill').classList.remove('live');
        document.getElementById('mode-pill').textContent = 'SYNTH';
    }

    function wireApiEvents() {
        api.scoreLoaded.on(async (score) => {
            log("Score loaded: " + (score.title || "(untitled)"));
            scoreRef = score;

            forceCleanElectricGuitar(score);

            try {
                songKey = detectSongKey(score);
                log(`Key: ${songKey.tonic} ${songKey.mode}`);
            } catch (e) { songKey = null; log('Key detection failed: ' + e.message); }

            activeChordName = "";
            extCycle = 0;
            updateKeyStrip();
            baseChord = "";
            const clabel = document.getElementById('fb-chord-label');
            if(clabel) clabel.textContent = "";

            populateTrackSelect(score);
            populateMixer(score);
            currentTrackIdx = -1;

            barNotesMap = buildBarNotesMap(score);
            lastPaintedBarIdx = -2;
            repaintFretboard(0, null);

            const track = score.backingTrack?.rawAudioFile ? { data: score.backingTrack.rawAudioFile } : score.audioTracks?.length ? score.audioTracks[0] : null;

            if (!track || !track.data) {
                clearExternalAudio();
                return;
            }

            await loadExternalAudioBytes(track.data, "embedded audio");
        });

        api.playerReady.on(() => {
            ensureExternalHandler();
            document.getElementById('btn-play').disabled = false;
        });

        try { api.soundFontLoaded?.on?.(() => log('[SF2] soundFontLoaded fired — synth bank updated')); } catch (_) {}
        try { api.soundFontLoadFailed?.on?.((e) => log('[SF2] soundFontLoadFailed: ' + (e?.error?.message || e?.message || e))); } catch (_) {}

        api.playerStateChanged.on((e) => {
            document.getElementById('btn-play').textContent = e.state === 1 ? '⏸' : '▶';
            if (e.state === 1) acquireWakeLock();
            else releaseWakeLock();
        });

        api.playerPositionChanged.on((e) => {
            const cur = e.currentTime / 1000, tot = e.endTime / 1000;
            const fmt = (s) => isNaN(s) ? "0:00" : Math.floor(s/60) + ":" + Math.floor(s%60).toString().padStart(2, '0');
            const timeDisp = document.getElementById('time');
            if(timeDisp) timeDisp.textContent = `${fmt(cur)} / ${fmt(tot)}`;
            
            const pfill = document.getElementById('prog-fill');
            if(pfill) pfill.style.width = ((e.currentTime / e.endTime) * 100 || 0) + '%';
        });

        api.playedBeatChanged.on((beat) => {
            const b = beat?.beat || beat;
            if (!b) return;
            const barIdx = b.voice?.bar?.masterBar?.index ?? b.voice?.bar?.index ?? -1;

            const newChord = extractChordFromBeat(b);
            if (newChord && newChord !== activeChordName) {
                activeChordName = newChord;
                updateKeyStrip();
            }

            repaintFretboard(barIdx, collectSoundingNotes(b));
        });

        api.beatMouseDown.on((beat) => {
            const b = beat?.beat || beat;
            if (!b) return;
            const barIdx = b.voice?.bar?.masterBar?.index ?? b.voice?.bar?.index ?? -1;

            const newChord = extractChordFromBeat(b);
            if (newChord && newChord !== activeChordName) {
                activeChordName = newChord;
                updateKeyStrip();
            }

            repaintFretboard(barIdx, collectSoundingNotes(b));

            const tMs = b.absolutePlaybackStart;
            if (typeof tMs === 'number' && externalAudio && Number.isFinite(externalAudio.duration)) {
                const raw = alignmentActive ? scoreMsToAudioSec(tMs) : (tMs - syncOffsetMs) / 1000;
                const targetSec = Math.max(0, Math.min(externalAudio.duration, raw));
                externalAudio.currentTime = targetSec;
            }
        });
    }

    // ─────────────────────────────────────────────────────────────────────
    // PHASE C — Bridge alphaTab ↔ <audio>
    // ─────────────────────────────────────────────────────────────────────
    function ensureExternalHandler() {
        const output = api?.player?.output;
        if (!output) return;

        const handler = {
            get backingTrackDuration() {
                const d = externalAudio.duration;
                return Number.isFinite(d) ? d * 1000 : 0;
            },
            get playbackRate() { return externalAudio.playbackRate; },
            set playbackRate(v) { externalAudio.playbackRate = v; },
            get masterVolume() { return externalAudio.volume; },
            set masterVolume(v) { externalAudio.volume = v; },
            seekTo(timeMs) {
                externalAudio.currentTime = timeMs / 1000;
            },
            play() {
                externalAudio.play().catch(e => log("audio.play() rejected: " + e.message));
            },
            pause() { externalAudio.pause(); }
        };
        output.handler = handler;

        if (externalHandlerAttached) return;
        externalHandlerAttached = true;

        const onTimeUpdate = () => {
            if (!externalMode) return;
            if (isLoopOn && loopStartMs >= 0 && loopEndMs > loopStartMs) {
                const curMs = externalAudio.currentTime * 1000;
                if (curMs >= loopEndMs) {
                    externalAudio.currentTime = loopStartMs / 1000;
                }
            }
            const out = api?.player?.output;
            if (out && out.updatePosition) {
                const audioSec = externalAudio.currentTime;
                const scoreMs = alignmentActive
                    ? audioSecToScoreMs(audioSec)
                    : (audioSec * 1000) + syncOffsetMs;
                out.updatePosition(scoreMs);
            }
        };
        externalAudio.addEventListener('timeupdate', onTimeUpdate);
        externalAudio.addEventListener('seeked', onTimeUpdate);
        const rafLoop = () => {
            onTimeUpdate();
            positionTimer = requestAnimationFrame(rafLoop);
        };
        externalAudio.addEventListener('play', () => {
            cancelAnimationFrame(positionTimer);
            positionTimer = requestAnimationFrame(rafLoop);
        });
        externalAudio.addEventListener('pause', () => cancelAnimationFrame(positionTimer));
        externalAudio.addEventListener('ended', () => {
            cancelAnimationFrame(positionTimer);
            if (externalMode) api.pause();
        });
    }

    // ─────────────────────────────────────────────────────────────────────
    // PLAY BUTTON
    // ─────────────────────────────────────────────────────────────────────
    const btnPlay = document.getElementById('btn-play');
    if (btnPlay) {
        btnPlay.onclick = () => {
            startPlayback();
        };
    }

    // ─────────────────────────────────────────────────────────────────────
    // FILE OPEN — Score (.gp etc.)
    // ─────────────────────────────────────────────────────────────────────
    const fileInput = document.getElementById('file-input');
    if (fileInput) {
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // PDF → OMR alignment flow
            const isPdf = /\.pdf$/i.test(file.name) || file.type === 'application/pdf';
            setStatus('Picked: ' + file.name + (isPdf ? ' — PDF detected.' : ''));
            if (isPdf) {
                pendingPdfFile = file;
                document.getElementById('song-info').textContent = file.name + ' (PDF)';
                warmSpace();  // wake the HF Space while user picks the MP3
                if (lastAudioFile) {
                    alignPdfWithMp3(file, lastAudioFile);
                    pendingPdfFile = null;
                } else {
                    setStatus('PDF received. Now click 🎵 and pick the matching MP3 to start OMR + alignment.');
                }
                fileInput.value = '';
                return;
            }

            document.getElementById('song-info').textContent = file.name;
            const btnP = document.getElementById('btn-play');
            if(btnP) {
                btnP.disabled = true;
                btnP.textContent = "⏳";
            }

            clearAlignment();
            clearExternalAudio();
            scoreFileKey = file.name + ':' + file.size;
            lastScoreFile = file;
            resetSyncDisplay();
            restoreSync();

            loopStartMs = -1; loopEndMs = -1; isLoopOn = false;
            const btnA = document.getElementById('btn-loop-a');
            if(btnA) btnA.classList.remove('on');
            const btnB = document.getElementById('btn-loop-b');
            if(btnB) btnB.classList.remove('on');
            const btnTgl = document.getElementById('btn-loop-toggle');
            if(btnTgl) btnTgl.classList.remove('on');

            const reader = new FileReader();
            reader.onload = (ev) => api.load(ev.target.result);
            reader.readAsArrayBuffer(file);
            fileInput.value = '';
        };
    }

    // ─────────────────────────────────────────────────────────────────────
    // FILE OPEN — Manual backing track (MP3/WAV/OGG)
    // ─────────────────────────────────────────────────────────────────────
    const mp3Input = document.getElementById('mp3-input');
    if (mp3Input) {
        mp3Input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            lastAudioFile = file;

            // If a PDF was uploaded first, pair them now and run OMR+align.
            if (pendingPdfFile) {
                const pdf = pendingPdfFile;
                pendingPdfFile = null;
                await alignPdfWithMp3(pdf, file);
                mp3Input.value = '';
                return;
            }

            if (!scoreFileKey) {
                log("Load a score first, then attach a backing track.");
                mp3Input.value = '';
                return;
            }
            log("Reading backing track: " + file.name);
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const bytes = new Uint8Array(ev.target.result);
                const ok = await loadExternalAudioBytes(bytes, file.name);
                if (ok) {
                    uploadedMp3Key = file.name + ':' + file.size;
                    clearAlignment();  // new audio invalidates any old warp path
                    resetSyncDisplay();
                    restoreSync();
                }
            };
            reader.readAsArrayBuffer(file);
            mp3Input.value = '';
        };
    }

    async function resetSoundFont() {
        if (!api) {
            setStatus('Tap ▶ once to boot alphaTab first.', 'err');
            return;
        }
        setStatus('Resetting to default Sonivox SoundFont…');
        try {
            const resp = await fetch(CDN + 'soundfont/sonivox.sf2');
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const buf = await resp.arrayBuffer();
            const fn = (typeof api.loadSoundFont === 'function') ? api.loadSoundFont
                     : (typeof api.loadSoundFontFromBytes === 'function') ? api.loadSoundFontFromBytes
                     : api.player?.loadSoundFont?.bind(api.player);
            if (!fn) throw new Error('loadSoundFont API not available');
            fn.call(api, new Uint8Array(buf), false);  // replace, not append
            try { api.stop?.(); } catch (_) {}
            setStatus('Default SoundFont restored.');
        } catch (e) {
            setStatus('Reset failed: ' + e.message, 'err');
        }
    }
    window.resetSoundFont = resetSoundFont;

    // SF2 / SF3 upload — replace alphaTab's default Sonivox SoundFont with
    // a sampled-instrument one (e.g. a Stratocaster sampleset). The
    // method name varies across alphaTab releases, so we try the known
    // ones in order.
    const sf2Input = document.getElementById('sf2-input');
    if (sf2Input) {
        sf2Input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!api) {
                setStatus('Tap ▶ once to boot alphaTab, then upload the SF2.', 'err');
                sf2Input.value = '';
                return;
            }
            setStatus('Loading SoundFont: ' + file.name);
            try {
                const buf = await file.arrayBuffer();
                const bytes = new Uint8Array(buf);
                let result;
                if (typeof api.loadSoundFont === 'function') {
                    result = api.loadSoundFont(bytes, true);
                } else if (typeof api.loadSoundFontFromBytes === 'function') {
                    result = api.loadSoundFontFromBytes(bytes, true);
                } else if (api.player && typeof api.player.loadSoundFont === 'function') {
                    result = api.player.loadSoundFont(bytes, true);
                } else {
                    throw new Error('loadSoundFont API not available on this alphaTab build');
                }
                if (result === false) {
                    setStatus('Player not ready — load a score, then try again.', 'err');
                } else {
                    // The synth applies new presets to notes triggered AFTER
                    // the load — anything in flight still uses the old bank.
                    // Stopping playback here forces the next ▶ to re-bind.
                    try { api.stop?.(); } catch (_) {}
                    setStatus('SoundFont loaded: ' + file.name + ' — press ▶ to hear it. If silent, toggle 🌊 off.');
                    log('SoundFont loaded: ' + file.name + ' (' + buf.byteLength + ' B)');
                }
            } catch (err) {
                setStatus('SoundFont load failed: ' + err.message, 'err');
                log('SoundFont load error: ' + (err.stack || err.message));
            }
            sf2Input.value = '';
        };
    }

    // ─────────────────────────────────────────────────────────────────────
    // WAV ENCODER
    // ─────────────────────────────────────────────────────────────────────
    function audioBufferToWavBlob(buffer) {
        const numCh = buffer.numberOfChannels;
        const length = buffer.length * numCh * 2 + 44;
        const out = new ArrayBuffer(length);
        const view = new DataView(out);
        let pos = 0;
        const set16 = (d) => { view.setUint16(pos, d, true); pos += 2; };
        const set32 = (d) => { view.setUint32(pos, d, true); pos += 4; };
        set32(0x46464952);              
        set32(length - 8);
        set32(0x45564157);              
        set32(0x20746d66);              
        set32(16);
        set16(1);                       
        set16(numCh);
        set32(buffer.sampleRate);
        set32(buffer.sampleRate * 2 * numCh);
        set16(numCh * 2);
        set16(16);
        set32(0x61746164);              
        set32(length - pos - 4);

        const channels = [];
        for (let c = 0; c < numCh; c++) channels.push(buffer.getChannelData(c));
        for (let i = 0; i < buffer.length; i++) {
            for (let c = 0; c < numCh; c++) {
                let s = Math.max(-1, Math.min(1, channels[c][i]));
                view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true);
                pos += 2;
            }
        }
        return new Blob([out], { type: "audio/wav" });
    }

}); // END DOMContentLoaded Wrapper
