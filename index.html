<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AlphaTab Safari - Stable GP8 Engine</title>

<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>

<style>
html, body {
    height: 100%;
    margin: 0;
    background: #0f172a;
    font-family: -apple-system, sans-serif;
    overflow: hidden;
}

:root {
    --accent:#e94560;
    --surface:#1e293b;
    --text:#e2e8f0;
}

#app {
    height: 100%;
    display: flex;
    flex-direction: column;
    opacity: 0.1;
    pointer-events: none;
}

#app.ready {
    opacity: 1;
    pointer-events: auto;
}

#header, #footer {
    background: var(--surface);
    color: var(--text);
    padding: 10px 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

#main {
    flex: 1;
    background: white;
    overflow: hidden;
}

#at {
    width: 100%;
    height: 100%;
}

.btn {
    background: var(--accent);
    border: none;
    color: white;
    padding: 10px 16px;
    border-radius: 8px;
    font-weight: 700;
}

.btn:disabled {
    background: #475569;
}

#startup {
    position: absolute;
    inset: 0;
    background: #0f172a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

#debug {
    height: 120px;
    background: black;
    color: #fbbf24;
    font-size: 11px;
    overflow: auto;
    padding: 8px;
}
</style>
</head>

<body>

<div id="startup">
    <button class="btn" id="boot">BOOT ENGINE</button>
</div>

<div id="app">

<div id="header">
    <div style="color:var(--accent); font-weight:800;">AlphaTab</div>
    <div id="info" style="flex:1; opacity:.7;">Load GP8 file</div>
    <button class="btn" onclick="document.getElementById('file').click()">Open</button>
    <input type="file" id="file" hidden />
</div>

<div id="main">
    <div id="at"></div>
</div>

<div id="footer">
    <button class="btn" id="play" disabled>▶</button>
    <div id="time" style="flex:1; font-family:monospace;">0:00 / 0:00</div>
</div>

</div>

<div id="debug"></div>

<script>

const log = (m) => {
    const el = document.getElementById('debug');
    if (!el) return;
    el.innerText += "\n> " + m;
    el.scrollTop = el.scrollHeight;
};

const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';

let api;
let audioCtx;
let decodeCtx;

let pendingWavUrl = null;
let engineReady = false;
let mediaReady = false;
let booted = false;

/* ---------------- BOOT ---------------- */
document.getElementById("boot").onclick = async () => {

    log("Booting engine...");

    audioCtx = new AudioContext();
    await audioCtx.resume();

    decodeCtx = new AudioContext();
    await decodeCtx.resume();

    api = new alphaTab.AlphaTabApi(document.getElementById("at"), {

        core: {
            fontDirectory: CDN + "font/"
        },

        display: {
            scale: 1.0,
            layoutMode: "page"
        },

        player: {
            enablePlayer: true,
            enableCursor: true,
            enableBackingTracks: true,
            scrollMode: "vertical",
            soundFont: CDN + "soundfont/sonivox.sf2"
        }
    });

    bindApiEvents(); // 🔥 IMPORTANT FIX

    document.getElementById("startup").style.display = "none";
    document.getElementById("app").classList.add("ready");

    booted = true;

    log("Engine online");
    log("Boot complete");
};

/* ---------------- SAFE EVENT BINDING ---------------- */
function bindApiEvents() {

    if (!api) {
        log("API not ready");
        return;
    }

    api.scoreLoaded.on(async (score) => {

        log("Score loaded");

        if (!score.audioTracks?.length) {
            mediaReady = true;
            tryUnlock();
            return;
        }

        try {
            const track = score.audioTracks[0];

            const ogg = track.data.buffer.slice(
                track.data.byteOffset,
                track.data.byteOffset + track.data.byteLength
            );

            log("Decoding audio...");

            const decoded = await decodeCtx.decodeAudioData(ogg);

            if (pendingWavUrl) URL.revokeObjectURL(pendingWavUrl);

            const wavBlob = audioBufferToWav(decoded);
            pendingWavUrl = URL.createObjectURL(wavBlob);

            api.settings.player.backingTrack = pendingWavUrl;

            mediaReady = true;
            log("Backing track bound");

            tryUnlock();

        } catch (e) {
            log("Decode error: " + e.message);
            mediaReady = true;
            tryUnlock();
        }
    });

    api.playerReady.on(() => {

        log("Player ready");

        engineReady = true;
        tryUnlock();

        setTimeout(() => {
            api.render?.();
            api.resize?.();
        }, 50);
    });
}

/* ---------------- FILE LOAD (SAFE GATED) ---------------- */
document.getElementById("file").onchange = (e) => {

    if (!booted) {
        log("Engine not booted yet");
        return;
    }

    const file = e.target.files[0];
    if (!file) return;

    document.getElementById("info").innerText = file.name;

    engineReady = false;
    mediaReady = false;

    const reader = new FileReader();
    reader.onload = (ev) => api.load(ev.target.result);
    reader.readAsArrayBuffer(file);
};

/* ---------------- UNLOCK LOGIC ---------------- */
function tryUnlock() {
    if (engineReady && mediaReady) {
        const btn = document.getElementById("play");
        btn.disabled = false;
        log("READY: Engine + Media synced");
    }
}

/* ---------------- PLAY ---------------- */
document.getElementById("play").onclick = () => {

    if (audioCtx.state !== "running") audioCtx.resume();
    if (api.player?.synth?.audioContext?.state !== "running") {
        api.player.synth.audioContext.resume();
    }

    api.playPause();
};

/* ---------------- WAV ENCODER ---------------- */
function audioBufferToWav(buffer) {
    const num = buffer.numberOfChannels;
    const len = buffer.length * num * 2 + 44;

    const ab = new ArrayBuffer(len);
    const view = new DataView(ab);

    let pos = 0;

    const w16 = v => { view.setUint16(pos, v, true); pos += 2; };
    const w32 = v => { view.setUint32(pos, v, true); pos += 4; };

    w32(0x46464952);
    w32(len - 8);
    w32(0x45564157);
    w32(0x20746d66);
    w32(16);
    w16(1);
    w16(num);
    w32(buffer.sampleRate);
    w32(buffer.sampleRate * 2 * num);
    w16(num * 2);
    w16(16);
    w32(0x61746164);
    w32(len - pos - 4);

    const chans = [];
    for (let i = 0; i < num; i++) chans.push(buffer.getChannelData(i));

    let o = 0;

    while (pos < len) {
        for (let i = 0; i < num; i++) {
            let s = Math.max(-1, Math.min(1, chans[i][o]));
            view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true);
            pos += 2;
        }
        o++;
    }

    return new Blob([ab], { type: "audio/wav" });
}

</script>

</body>
</html>
