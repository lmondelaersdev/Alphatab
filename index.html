<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>AlphaTab Safari Pro - Stable Engine</title>

<script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>

<style>
:root { --accent:#e94560; --bg:#0f172a; --surface:#1e293b; --text:#e2e8f0; }

body {
    margin:0; height:100dvh; display:flex; flex-direction:column;
    background:var(--bg); color:var(--text);
    font-family:-apple-system, sans-serif; overflow:hidden;
}

#app { flex:1; display:flex; flex-direction:column; opacity:0.1; pointer-events:none; transition:0.3s; }
#app.ready { opacity:1; pointer-events:auto; }

#header,#footer {
    background:var(--surface);
    padding:10px 15px;
    display:flex;
    align-items:center;
    gap:10px;
}

#main { flex:1; background:white; overflow:auto; }

.btn {
    background:var(--accent);
    border:none;
    color:white;
    padding:10px 16px;
    border-radius:8px;
    font-weight:700;
}

.btn:disabled { background:#475569; }

.overlay {
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:var(--bg);
}

#debug {
    height:140px;
    background:black;
    color:#fbbf24;
    font-size:11px;
    overflow:auto;
    padding:8px;
}
</style>
</head>

<body>

<div id="startup" class="overlay">
    <button class="btn" id="boot">BOOT ENGINE</button>
</div>

<div id="app">

<div id="header">
    <div style="color:var(--accent); font-weight:800;">AlphaTab</div>
    <div id="info" style="flex:1; opacity:.7;">Load GP8 file</div>
    <button class="btn" onclick="document.getElementById('file').click()">Open</button>
    <input type="file" id="file" hidden />
</div>

<div id="main"><div id="at"></div></div>

<div id="footer">
    <button class="btn" id="play" disabled>▶</button>
    <div id="time" style="flex:1; font-family:monospace;">0:00 / 0:00</div>
</div>

</div>

<div id="debug"></div>

<script>
const log = m => {
    const el = document.getElementById('debug');
    el.innerText += "\n> " + m;
    el.scrollTop = el.scrollHeight;
};

const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';

let api;
let audioCtx;
let decodeCtx;

let pendingWavUrl = null;

let engineReady = false;
let mediaReady = false;

function tryUnlock() {
    if (engineReady && mediaReady) {
        document.getElementById("play").disabled = false;
        log("READY: Engine + Media synced");
    }
}

/* ---------------- BOOT ---------------- */
document.getElementById("boot").onclick = async () => {

    log("Booting engine...");

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();

    decodeCtx = new (window.AudioContext || window.webkitAudioContext)();
    await decodeCtx.resume();

    api = new alphaTab.AlphaTabApi(document.getElementById("at"), {
        core: { fontDirectory: CDN + "font/" },
        player: {
            enablePlayer: true,
            enableCursor: true,
            enableBackingTracks: true,
            soundFont: CDN + "soundfont/sonivox.sf2"
        }
    });

    document.getElementById("startup").style.display = "none";
    document.getElementById("app").classList.add("ready");

    log("Engine online");
};

/* ---------------- FILE LOAD ---------------- */
document.getElementById("file").onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    log("Loading: " + file.name);
    document.getElementById("info").innerText = file.name;

    engineReady = false;
    mediaReady = false;

    const reader = new FileReader();
    reader.onload = (ev) => api.load(ev.target.result);
    reader.readAsArrayBuffer(file);
};

/* ---------------- SCORE LOADED ---------------- */
api?.scoreLoaded?.on(async (score) => {

    log("Score loaded");

    if (!score.audioTracks?.length) {
        mediaReady = true;
        tryUnlock();
        return;
    }

    try {
        const track = score.audioTracks[0];

        const ogg = track.data.buffer.slice(
            track.data.byteOffset,
            track.data.byteOffset + track.data.byteLength
        );

        log("Decoding OGG...");

        const decoded = await decodeCtx.decodeAudioData(ogg);

        if (pendingWavUrl) URL.revokeObjectURL(pendingWavUrl);

        const wavBlob = audioBufferToWav(decoded);
        pendingWavUrl = URL.createObjectURL(wavBlob);

        // IMPORTANT: bind BEFORE engine locks playback graph
        api.settings.player.backingTrack = pendingWavUrl;

        log("Backing track bound");

        mediaReady = true;
        tryUnlock();

    } catch (err) {
        log("Decode error: " + err.message);
        mediaReady = true;
        tryUnlock();
    }
});

/* ---------------- PLAYER READY ---------------- */
api?.playerReady?.on(() => {
    log("Player ready");
    engineReady = true;
    tryUnlock();
});

/* ---------------- PLAY ---------------- */
document.getElementById("play").onclick = () => {

    if (audioCtx.state !== "running") audioCtx.resume();
    if (api.player?.synth?.audioContext?.state !== "running") {
        api.player.synth.audioContext.resume();
    }

    api.playPause();
};

/* ---------------- WAV ENCODER ---------------- */
function audioBufferToWav(buffer) {
    const num = buffer.numberOfChannels;
    const len = buffer.length * num * 2 + 44;

    const ab = new ArrayBuffer(len);
    const view = new DataView(ab);

    let pos = 0;

    const w16 = v => { view.setUint16(pos, v, true); pos += 2; };
    const w32 = v => { view.setUint32(pos, v, true); pos += 4; };

    w32(0x46464952);
    w32(len - 8);
    w32(0x45564157);
    w32(0x20746d66);
    w32(16);
    w16(1);
    w16(num);
    w32(buffer.sampleRate);
    w32(buffer.sampleRate * 2 * num);
    w16(num * 2);
    w16(16);
    w32(0x61746164);
    w32(len - pos - 4);

    const chans = [];
    for (let i = 0; i < num; i++) chans.push(buffer.getChannelData(i));

    let o = 0;

    while (pos < len) {
        for (let i = 0; i < num; i++) {
            let s = Math.max(-1, Math.min(1, chans[i][o]));
            view.setInt16(pos, s < 0 ? s * 32768 : s * 32767, true);
            pos += 2;
        }
        o++;
    }

    return new Blob([ab], { type: "audio/wav" });
}
</script>

</body>
</html>
