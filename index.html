<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaTab Player - Ultimate Safari Fix</title>
  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.min.js"></script>
  <style>
    :root {
      --accent:    #e94560;
      --accent-dk: #c73652;
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #263348;
      --border:    #334155;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --sidebar-w: 230px;
      --header-h:  52px;
      --footer-h:  62px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; }

    #app { display: flex; flex-direction: column; height: 100dvh; }
    #header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 1rem; gap: 0.6rem; flex-shrink: 0; }
    #logo { font-size: 1.1rem; font-weight: 700; color: #fff; margin-right: 0.5rem; }
    #logo em { color: var(--accent); font-style: normal; }
    #song-info { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; color: var(--muted); font-size: 0.82rem; padding: 0 0.5rem; }

    #body { display: flex; flex: 1; overflow: hidden; }
    #sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; }
    .sidebar-section { border-bottom: 1px solid var(--border); padding: 0.5rem 0.75rem; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
    #track-list { flex: 1; overflow-y: auto; padding: 0.25rem 0; }
    .track-item { display: flex; align-items: center; padding: 0.45rem 0.75rem; gap: 0.5rem; border-radius: 5px; margin: 1px 0.3rem; cursor: default; }
    .track-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .track-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.82rem; }

    #viewport { flex: 1; overflow: auto; background: #d1d5db; position: relative; }
    #at-element { background: #fff; }

    .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    #audio-unlock-overlay { background: var(--bg); color: white; cursor: pointer; transition: opacity 0.3s; }
    #drop-overlay { background: rgba(15,23,42,0.94); z-index: 50; }
    #load-overlay { background: rgba(15,23,42,0.78); z-index: 60; }
    .hidden { display: none !important; }

    .spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.65s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #footer { height: var(--footer-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 1rem; gap: 0.55rem; flex-shrink: 0; }
    .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: 0.82rem; height: 34px; padding: 0 0.8rem; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .icon-btn { width: 34px; padding: 0; font-size: 1rem; }
    .sep { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; }

    #time { font-family: monospace; font-size: 0.82rem; color: var(--muted); min-width: 11ch; text-align: center; }
    #prog-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 3px; position: relative; cursor: pointer; }
    #prog-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; pointer-events: none; }
    #file-input { display: none; }
  </style>
</head>
<body>

<div id="audio-unlock-overlay" class="overlay">
    <div style="text-align: center;">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🎸</div>
        <div style="font-size: 1.2rem; font-weight: 600;">Tap to Enable Audio</div>
        <div style="color: var(--muted); margin-top: 0.5rem;">Safari requires a manual gesture to play embedded tracks.</div>
    </div>
</div>

<input type="file" id="file-input" />

<div id="app">
  <div id="header">
    <div id="logo">Alpha<em>Tab</em></div>
    <div id="song-info">Load a Guitar Pro file to begin</div>
    <button class="btn primary" id="btn-open">Open File</button>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="sidebar-section">Tracks</div>
      <div id="track-list"></div>
    </div>

    <div id="viewport">
      <div id="load-overlay" class="overlay hidden"><div class="spinner"></div></div>
      <div id="drop-overlay" class="overlay">
          <div style="font-weight: 600; color:var(--muted)">Drop .gp file here</div>
      </div>
      <div id="at-element"></div>
    </div>
  </div>

  <div id="footer">
    <button class="btn icon-btn" id="btn-play">&#9654;</button>
    <button class="btn icon-btn" id="btn-stop">&#9632;</button>
    <div class="sep"></div>
    <div id="time">0:00 / 0:00</div>
    <div id="prog-wrap"><div id="prog-fill"></div></div>
    <div class="sep"></div>
    <div style="font-size: 0.75rem; color: var(--muted);">Vol</div>
    <input type="range" id="sl-vol" min="0" max="100" value="80" style="width: 70px; accent-color: var(--accent);" />
  </div>
</div>

<script>
  const atEl = document.getElementById('at-element');
  const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/';

  const api = new alphaTab.AlphaTabApi(atEl, {
    core: { fontDirectory: CDN + 'font/' },
    player: {
      enablePlayer: true,
      soundFont: CDN + 'soundfont/sonivox.sf2',
      playerMode: 1 // WebAudio
    }
  });

  /* ───────────────────────────────────────────
     SAFARI AUDIO HEARTBEAT & MP3 FIX
  ─────────────────────────────────────────── */
  
  const unlockOverlay = document.getElementById('audio-unlock-overlay');
  
  function triggerSafariUnlock() {
    // 1. Resume the WebAudio context for the MIDI synth
    if (api.player?.synth?.audioContext) {
      const ctx = api.player.synth.audioContext;
      if (ctx.state === 'suspended') ctx.resume();
      
      // Prime WebAudio with silence
      const b = ctx.createBuffer(1, 1, 22050);
      const s = ctx.createBufferSource();
      s.buffer = b;
      s.connect(ctx.destination);
      s.start(0);
    }

    // 2. IMPORTANT: If an MP3 is already loaded, we MUST "touch" the audio element
    // synchronously in this click handler, otherwise Safari blocks it.
    if (api.player?.backingTrackAudio) {
      const bt = api.player.backingTrackAudio;
      bt.play().then(() => {
        bt.pause(); // Just "priming" the permission
        bt.currentTime = 0;
      }).catch(() => {});
    }

    unlockOverlay.classList.add('hidden');
  }

  unlockOverlay.addEventListener('click', triggerSafariUnlock);
  unlockOverlay.addEventListener('touchstart', triggerSafariUnlock);

  /* ───────────────────────────────────────────
     PLAYBACK HANDLER
  ─────────────────────────────────────────── */

  document.getElementById('btn-play').addEventListener('click', () => {
    // Re-verify context is active (Safe for Safari)
    if (api.player?.synth?.audioContext?.state === 'suspended') {
      api.player.synth.audioContext.resume();
    }

    // Direct trigger for the embedded MP3 element
    if (api.player?.backingTrackAudio) {
        api.player.backingTrackAudio.play().catch(e => console.warn("MP3 play blocked", e));
    }

    api.playPause();
  });

  /* ───────────────────────────────────────────
     FILE HANDLING
  ─────────────────────────────────────────── */

  const fileInput = document.getElementById('file-input');
  document.getElementById('btn-open').addEventListener('click', () => fileInput.click());
  
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => api.load(e.target.result);
    reader.readAsArrayBuffer(file);
    e.target.value = ''; // Reset
  });

  api.scoreLoaded.on(score => {
    document.getElementById('drop-overlay').classList.add('hidden');
    const artist = score.artist ? ` - ${score.artist}` : '';
    document.getElementById('song-info').innerHTML = `<strong>${score.title || 'Untitled'}</strong>${artist}`;
    
    // Update Track List
    const tl = document.getElementById('track-list');
    tl.innerHTML = '';
    score.tracks.forEach((t) => {
        const item = document.createElement('div');
        item.className = 'track-item';
        item.innerHTML = `<div class="track-dot" style="background:#e94560"></div><span class="track-name">${t.name}</span>`;
        tl.appendChild(item);
    });
  });

  /* ───────────────────────────────────────────
     UI UPDATES
  ─────────────────────────────────────────── */

  api.renderStarted.on(() => document.getElementById('load-overlay').classList.remove('hidden'));
  api.postRenderFinished.on(() => document.getElementById('load-overlay').classList.add('hidden'));

  api.playerStateChanged.on(e => {
    document.getElementById('btn-play').innerHTML = e.state === 1 ? '&#9646;&#9646;' : '&#9654;';
  });

  api.playerPositionChanged.on(e => {
    const d = e.endTime / 1000;
    const c = e.currentTime / 1000;
    const format = (v) => Math.floor(v/60) + ':' + (Math.floor(v%60)).toString().padStart(2,'0');
    document.getElementById('time').innerText = `${format(c)} / ${format(d)}`;
    document.getElementById('prog-fill').style.width = (e.currentTime / e.endTime * 100) + '%';
  });

  document.getElementById('btn-stop').addEventListener('click', () => api.stop());
  document.getElementById('sl-vol').addEventListener('input', e => { api.masterVolume = e.target.value / 100; });

  // Drag & Drop Support
  window.addEventListener('dragover', e => e.preventDefault());
  window.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = e => api.load(e.target.result);
        reader.readAsArrayBuffer(file);
    }
  });
</script>
</body>
</html>
