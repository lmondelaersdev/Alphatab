<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AlphaTab Safari Pro - Sync Only</title>
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>
    <style>
        :root { --accent: #e94560; --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0; }
        body { height: 100dvh; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        #app { display: flex; flex-direction: column; height: 100%; opacity: 0.3; pointer-events: none; transition: opacity 0.5s; }
        #header { height: 60px; background: var(--surface); display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        #main { flex: 1; overflow-y: auto; background: #fff; }
        #footer { height: 75px; background: var(--surface); display: flex; align-items: center; padding: 0 15px; gap: 12px; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: var(--bg); text-align: center; }
        #debug-log { font-size: 10px; color: #94a3b8; margin-top: 20px; font-family: monospace; width: 90%; text-align: left; background: #000; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="startup-screen" class="overlay">
    <div style="font-size: 3rem;">🛠️</div>
    <h3>Stage 1: Render Engine</h3>
    <button class="btn" id="btn-start">INITIALIZE NOTATION</button>
    <div id="debug-log">Ready...</div>
</div>

<div id="app">
    <div id="header">
        <div style="font-weight: 800; color: var(--accent);">AlphaTab</div>
        <div id="song-info" style="flex:1; font-size: 0.8rem; opacity: 0.7;">1. Load File -> 2. Enable Sync</div>
        <button class="btn" style="padding: 5px 10px;" onclick="document.getElementById('file-input').click()">Open GP File</button>
        <input type="file" id="file-input" style="display:none" accept=".gp,.gp3,.gp4,.gp5,.gpx" />
    </div>
    <div id="main"><div id="at-element"></div></div>
    <div id="footer">
        <button class="btn" id="btn-sync" style="background: #22c55e;">ENABLE AUDIO SYNC</button>
        <button class="btn" id="btn-play" style="display:none; width: 50px;">▶</button>
        <div id="time" style="font-size: 0.8rem; min-width: 80px;">0:00/0:00</div>
        <div style="flex:1; height: 4px; background: #334155; border-radius: 2px; overflow: hidden;">
            <div id="prog-fill" style="height: 100%; background: var(--accent); width: 0%;"></div>
        </div>
    </div>
</div>

<script>
    const log = (msg) => { document.getElementById('debug-log').innerText += "\n> " + msg; };
    const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';
    
    let api = null;

    // STAGE 1: Initialize just the renderer
    document.getElementById('btn-start').addEventListener('click', function() {
        this.style.display = 'none';
        log("Booting Renderer (No Audio)...");

        try {
            const element = document.getElementById('at-element');
            api = new alphaTab.AlphaTabApi(element, {
                core: { 
                    fontDirectory: CDN + 'font/',
                    engine: 'svg' // SVG is safer for Safari
                },
                player: { enablePlayer: false } // DISABLE player to prevent initialization hang
            });

            api.renderFinished.on(() => {
                log("Notation Rendered.");
                document.getElementById('startup-screen').style.display = 'none';
                document.getElementById('app').style.opacity = '1';
                document.getElementById('app').style.pointerEvents = 'all';
            });

            // Handle File Loading
            document.getElementById('file-input').addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (args) => api.load(args.target.result);
                reader.readAsArrayBuffer(file);
            });

        } catch (e) {
            log("Stage 1 Error: " + e.message);
        }
    });

    // STAGE 2: Inject the Player only when requested
    document.getElementById('btn-sync').addEventListener('click', async function() {
        const btn = this;
        btn.innerText = "Syncing...";
        log("Waking Audio Context...");

        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const actx = new AudioContext();
            await actx.resume();

            log("Injecting Player Engine...");
            // Update settings on the fly
            api.settings.player.enablePlayer = true;
            api.settings.player.enableBackingTracks = true;
            api.settings.player.soundFont = CDN + 'soundfont/mscore.sf2';
            
            // This re-initializes the internal player
            api.updateSettings();

            api.playerReady.on(() => {
                log("Audio Sync Ready!");
                btn.style.display = 'none';
                document.getElementById('btn-play').style.display = 'block';
                setupPlayerEvents();
            });

        } catch (e) {
            log("Stage 2 Error: " + e.message);
        }
    });

    function setupPlayerEvents() {
        const btnPlay = document.getElementById('btn-play');
        
        btnPlay.addEventListener('click', () => {
            if (api.player?.synth?.audioContext?.state !== 'running') {
                api.player.synth.audioContext.resume();
            }
            if (api.player.backingTrackAudio) {
                api.player.backingTrackAudio.play().then(() => {
                    if(api.player.state !== 1) api.player.backingTrackAudio.pause();
                });
            }
            api.playPause();
        });

        api.playerStateChanged.on(e => {
            btnPlay.innerText = (e.state === 1) ? '⏸' : '▶';
        });

        api.playerPositionChanged.on(e => {
            const current = e.currentTime / 1000;
            const total = e.endTime / 1000;
            const fmt = (s) => Math.floor(s/60 || 0) + ":" + (Math.floor(s%60 || 0)).toString().padStart(2, '0');
            document.getElementById('time').innerText = `${fmt(current)}/${fmt(total)}`;
            document.getElementById('prog-fill').style.width = (e.currentTime / e.endTime * 100) + '%';
        });
    }
</script>
</body>
</html>
