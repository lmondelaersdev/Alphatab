<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AlphaTab Safari - Ultimate Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>
    <style>
        :root { --accent: #e94560; --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0; }
        body { height: 100dvh; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        
        #app { display: flex; flex-direction: column; height: 100%; opacity: 0.1; pointer-events: none; transition: opacity 0.4s; }
        #app.ready { opacity: 1; pointer-events: all; }
        
        #header { height: 60px; background: var(--surface); display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #334155; }
        #main { flex: 1; overflow-y: auto; background: #fff; position: relative; }
        #footer { height: 80px; background: var(--surface); display: flex; align-items: center; padding: 0 15px; gap: 15px; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: var(--bg); text-align: center; }
        
        #debug-log { font-size: 11px; color: #fbbf24; margin-top: 15px; font-family: monospace; width: 90%; text-align: left; background: #000; padding: 10px; border-radius: 5px; height: 120px; overflow-y: auto; }

        .at-cursor-bar { background: rgba(233, 69, 96, 0.15) !important; }
        .at-cursor-beat { background: #e94560 !important; width: 3px !important; }
    </style>
</head>
<body>

<div id="startup-screen" class="overlay">
    <button class="btn" id="btn-initialize">1. BOOT ENGINE</button>
    <div id="debug-log">Log initialized...</div>
</div>

<div id="app">
    <div id="header">
        <div style="font-weight: 800; color: var(--accent);">AlphaTab</div>
        <div id="song-info" style="flex:1; font-size: 0.8rem; opacity: 0.7;">Load GP8 File</div>
        <button class="btn" style="padding: 8px 12px;" onclick="document.getElementById('file-input').click()">📁 Open File</button>
        <input type="file" id="file-input" style="display:none" accept=".gp,.gpx,.gp5,*/*" />
    </div>

    <div id="main"><div id="at-element"></div></div>

    <div id="footer">
        <button class="btn" id="btn-play" style="width: 60px; height: 50px; font-size: 1.5rem; background: #475569;">▶</button>
        <div style="flex:1;">
            <div id="time" style="font-size: 0.8rem; font-family: monospace; color: #94a3b8; margin-bottom: 4px;">0:00 / 0:00</div>
            <div style="height: 6px; background: #334155; border-radius: 3px; overflow: hidden;">
                <div id="prog-fill" style="height: 100%; background: var(--accent); width: 0%;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const logBox = document.getElementById('debug-log');
    const log = (msg) => { 
        console.log(msg); 
        logBox.innerText += "\n> " + msg; 
        logBox.scrollTop = logBox.scrollHeight; 
    };
    
    const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';
    let api = null;

    document.getElementById('btn-initialize').onclick = function() {
        this.style.display = 'none';
        log("Booting API...");
        
        try {
            api = new alphaTab.AlphaTabApi(document.getElementById('at-element'), {
                core: { 
                    fontDirectory: CDN + 'font/', 
                    engine: 'svg' 
                },
                player: { 
                    enablePlayer: true, 
                    enableCursor: true,          
                    enableBackingTracks: true,   
                    soundFont: CDN + 'soundfont/mscore.sf2' 
                }
            });

            // FIX: Unlock UI immediately instead of waiting for a render!
            document.getElementById('startup-screen').style.display = 'none';
            document.getElementById('app').classList.add('ready');
            log("UI Unlocked. Waiting for file...");

            api.renderFinished.on(() => {
                log("Score successfully rendered on screen.");
            });

            setupControls();

        } catch (e) { log("CRASH: " + e.message); }
    };

    function setupControls() {
        const fileInput = document.getElementById('file-input');
        const btnPlay = document.getElementById('btn-play');

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('song-info').innerText = file.name;
            btnPlay.style.background = "#475569";
            document.getElementById('prog-fill').style.width = '0%';
            document.getElementById('time').innerText = '0:00 / 0:00';

            const reader = new FileReader();
            reader.onload = (args) => {
                log("Parsing file... " + file.name);
                try {
                    api.load(args.target.result);
                } catch(err) {
                    log("Parse Error: " + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        api.playerReady.on(() => {
            log("AlphaTab Engine reports: Ready for audio!");
            btnPlay.style.background = "var(--accent)";
        });

        btnPlay.onclick = async () => {
            log("--- PLAY CLICKED ---");
            
            try {
                if (api.player?.synth?.audioContext) {
                    if (api.player.synth.audioContext.state !== 'running') {
                        log("Resuming Safari AudioContext...");
                        await api.player.synth.audioContext.resume();
                        log("Context State: " + api.player.synth.audioContext.state);
                    }
                }

                log("isReadyForPlayback: " + api.isReadyForPlayback);
                log("Executing api.playPause()...");
                api.playPause();

            } catch (err) {
                log("PLAY ERROR: " + err.message);
            }
        };

        api.playerStateChanged.on(e => {
            log("State changed to: " + e.state + " (0=Paused, 1=Playing)");
            btnPlay.innerText = (e.state === 1) ? '⏸' : '▶';
        });

        api.playerPositionChanged.on(e => {
            const current = e.currentTime / 1000;
            const total = e.endTime / 1000;
            const fmt = (s) => isNaN(s) ? "0:00" : Math.floor(s/60) + ":" + (Math.floor(s%60)).toString().padStart(2, '0');
            document.getElementById('time').innerText = `${fmt(current)} / ${fmt(total)}`;
            document.getElementById('prog-fill').style.width = ((e.currentTime / e.endTime) * 100 || 0) + '%';
        });
    }
</script>
</body>
</html>
