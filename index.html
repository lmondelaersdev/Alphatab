<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AlphaTab Safari - The Perfect WAV Hack</title>
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>
    <style>
        :root { --accent: #e94560; --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0; }
        body { height: 100dvh; margin: 0; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        
        #app { display: flex; flex-direction: column; flex: 1; opacity: 0.1; pointer-events: none; transition: opacity 0.4s; overflow: hidden; }
        #app.ready { opacity: 1; pointer-events: all; }
        
        #header { height: 60px; background: var(--surface); display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #334155; flex-shrink: 0; }
        #main { flex: 1; overflow-y: auto; background: #fff; position: relative; }
        #footer { height: 70px; background: var(--surface); display: flex; align-items: center; padding: 0 15px; gap: 15px; flex-shrink: 0; }
        
        #debug-container { height: 140px; background: #000; padding: 8px 15px; border-top: 2px solid var(--accent); flex-shrink: 0; }
        #debug-log { font-size: 11px; color: #fbbf24; font-family: monospace; height: 100%; overflow-y: auto; margin: 0; white-space: pre-wrap; }
        
        .btn { background: var(--accent); color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: var(--bg); text-align: center; }
        
        .at-cursor-bar { background: rgba(233, 69, 96, 0.15) !important; }
        .at-cursor-beat { background: #e94560 !important; width: 3px !important; }
    </style>
</head>
<body>

<div id="startup-screen" class="overlay">
    <button class="btn" id="btn-initialize" style="padding: 15px 30px; font-size: 1.2rem;">1. BOOT ENGINE</button>
</div>

<div id="app">
    <div id="header">
        <div style="font-weight: 800; color: var(--accent);">AlphaTab</div>
        <div id="song-info" style="flex:1; font-size: 0.8rem; opacity: 0.7; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">Load GP8 File</div>
        <button class="btn" style="padding: 8px 12px;" onclick="document.getElementById('file-input').click()">📁 Open File</button>
        <input type="file" id="file-input" style="display:none" accept=".gp,.gpx,.gp5,*/*" />
    </div>

    <div id="main"><div id="at-element"></div></div>

    <div id="footer">
        <button class="btn" id="btn-play" disabled style="width: 60px; height: 50px; font-size: 1.5rem; background: #475569;">▶</button>
        <div style="flex:1;">
            <div id="time" style="font-size: 0.8rem; font-family: monospace; color: #94a3b8; margin-bottom: 4px;">0:00 / 0:00</div>
            <div style="height: 6px; background: #334155; border-radius: 3px; overflow: hidden;">
                <div id="prog-fill" style="height: 100%; background: var(--accent); width: 0%;"></div>
            </div>
        </div>
    </div>
</div>

<div id="debug-container">
    <pre id="debug-log">System booted. Awaiting initialization...</pre>
</div>

<script>
    const logBox = document.getElementById('debug-log');
    const log = (msg) => { 
        logBox.innerText += "\n> " + msg; 
        logBox.scrollTop = logBox.scrollHeight; 
    };

    const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';
    let api = null;
    let webAudioCtx = null;

    // --- RAW AUDIO TO WAV CONVERTER ---
    function audioBufferToWavBlob(buffer) {
        log("Converting decoded audio to WAV format...");
        const numOfChan = buffer.numberOfChannels;
        const length = buffer.length * numOfChan * 2 + 44;
        const out = new ArrayBuffer(length);
        const view = new DataView(out);
        const channels = [];
        let sample = 0, offset = 0, pos = 0;

        const setUint16 = (data) => { view.setUint16(pos, data, true); pos += 2; };
        const setUint32 = (data) => { view.setUint32(pos, data, true); pos += 4; };

        setUint32(0x46464952); // "RIFF"
        setUint32(length - 8); // file length - 8
        setUint32(0x45564157); // "WAVE"
        setUint32(0x20746d66); // "fmt " chunk
        setUint32(16); // length = 16
        setUint16(1); // PCM
        setUint16(numOfChan);
        setUint32(buffer.sampleRate);
        setUint32(buffer.sampleRate * 2 * numOfChan); // byte rate
        setUint16(numOfChan * 2); // block-align
        setUint16(16); // 16-bit
        setUint32(0x61746164); // "data" chunk
        setUint32(length - pos - 4); // chunk length

        for(let i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

        while(pos < length) {
            for(let i = 0; i < numOfChan; i++) {
                sample = Math.max(-1, Math.min(1, channels[i][offset])); 
                sample = (0.5 + sample < 0 ? sample * 32768 : sample * 32767) | 0; 
                view.setInt16(pos, sample, true); 
                pos += 2;
            }
            offset++;
        }
        log("WAV conversion complete!");
        return new Blob([out], {type: "audio/wav"});
    }

    document.getElementById('btn-initialize').addEventListener('click', function() {
        document.getElementById('startup-screen').style.display = 'none';
        log("Booting API...");
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        webAudioCtx = new AudioContext();
        
        try {
            api = new alphaTab.AlphaTabApi(document.getElementById('at-element'), {
                core: { fontDirectory: CDN + 'font/' },
                player: { 
                    enablePlayer: true, 
                    enableCursor: true,          
                    // IMPORTANT: Start False so we can steal the audio first!
                    enableBackingTracks: false, 
                    soundFont: CDN + 'soundfont/sonivox.sf2' 
                }
            });

            document.getElementById('app').classList.add('ready');
            log("UI Unlocked.");
            setupControls();
        } catch (e) { log("BOOT CRASH: " + e.message); }
    });

    function setupControls() {
        const fileInput = document.getElementById('file-input');
        const btnPlay = document.getElementById('btn-play');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('song-info').innerText = file.name;
            btnPlay.disabled = true;
            btnPlay.style.background = "#475569";
            
            const reader = new FileReader();
            reader.onload = (args) => { api.load(args.target.result); };
            reader.readAsArrayBuffer(file);
        });

        // --- THE HEIST: INTERCEPT THE AUDIO ---
        api.scoreLoaded.on((score) => {
            if (score.audioTracks && score.audioTracks.length > 0) {
                log("Embedded audio detected. Decoding via WebAudio...");
                const data = score.audioTracks[0].data;
                const arrayBuffer = data.buffer.slice(data.byteOffset, data.byteOffset + data.byteLength);

                webAudioCtx.decodeAudioData(arrayBuffer, 
                    function(buffer) {
                        const wavBlob = audioBufferToWavBlob(buffer);
                        const wavUrl = URL.createObjectURL(wavBlob);
                        
                        log("Attaching Safari-friendly WAV to AlphaTab...");
                        
                        // Hand the WAV to AlphaTab and dynamically turn Backing Tracks ON
                        api.settings.player.backingTrack = wavUrl;
                        api.settings.player.enableBackingTracks = true; 
                        api.updateSettings();
                        
                        btnPlay.disabled = false;
                        btnPlay.style.background = "var(--accent)";
                        log("Ready to play with native sync!");
                    },
                    function(err) {
                        log("DECODE ERROR: Safari failed to read the OGG file.");
                    }
                );
            } else {
                log("No audio track found in file.");
                // Turn Backing Tracks on anyway just in case it uses MIDI fallback
                api.settings.player.enableBackingTracks = true;
                api.updateSettings();
                
                btnPlay.disabled = false;
                btnPlay.style.background = "var(--accent)";
            }
        });

        // SAFARI AUDIO UNLOCK
        btnPlay.addEventListener('click', () => {
            if (webAudioCtx.state === 'suspended') webAudioCtx.resume();
            
            if (api.player && api.player.synth && api.player.synth.audioContext) {
                if (api.player.synth.audioContext.state !== 'running') {
                    api.player.synth.audioContext.resume();
                }
            }

            if(api.player && api.player.backingTrackAudio) {
                api.player.backingTrackAudio.play().then(() => {
                    if (api.player.state !== 1) api.player.backingTrackAudio.pause();
                }).catch(e => log("Safari HTML5 Audio Block: " + e.message));
            }

            api.playPause();
        });

        api.playerStateChanged.on(e => {
            btnPlay.innerText = (e.state === 1) ? '⏸' : '▶';
        });

        api.playerPositionChanged.on(e => {
            const current = e.currentTime / 1000;
            const total = e.endTime / 1000;
            const fmt = (s) => isNaN(s) ? "0:00" : Math.floor(s/60) + ":" + (Math.floor(s%60)).toString().padStart(2, '0');
            document.getElementById('time').innerText = `${fmt(current)} / ${fmt(total)}`;
            document.getElementById('prog-fill').style.width = ((e.currentTime / e.endTime) * 100 || 0) + '%';
        });
    }
</script>
</body>
</html>
