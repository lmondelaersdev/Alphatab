<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AlphaTab Safari - Final Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>
    <style>
        :root { --accent: #e94560; --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0; }
        body { height: 100dvh; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        #app { display: none; flex-direction: column; height: 100%; }
        #header { height: 60px; background: var(--surface); display: flex; align-items: center; padding: 0 15px; gap: 10px; border-bottom: 1px solid #334155; }
        #main { flex: 1; overflow: hidden; position: relative; background: #fff; }
        #footer { height: 75px; background: var(--surface); display: flex; align-items: center; padding: 0 15px; gap: 12px; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: var(--bg); text-align: center; }
        #debug-log { font-size: 10px; color: #64748b; margin-top: 20px; font-family: monospace; max-width: 90%; white-space: pre-wrap; }
    </style>
</head>
<body>

<div id="startup-screen" class="overlay">
    <div style="font-size: 3rem;">🛠️</div>
    <h3 id="status-msg">Safari Engine Repair</h3>
    <button class="btn" id="btn-start">ACTIVATE ENGINE</button>
    <div id="debug-log">Ready to bypass local sandbox...</div>
</div>

<div id="app">
    <div id="header">
        <div style="font-weight: 800; color: var(--accent);">AlphaTab</div>
        <div id="song-info" style="flex:1; font-size: 0.8rem; opacity: 0.7; overflow: hidden; white-space: nowrap;">Load GP8...</div>
        <button class="btn" style="padding: 5px 10px;" onclick="document.getElementById('file-input').click()">Open</button>
        <input type="file" id="file-input" style="display:none" accept=".gp,.gp3,.gp4,.gp5,.gpx" />
    </div>
    <div id="main"><div id="at-element"></div></div>
    <div id="footer">
        <button class="btn" id="btn-play" style="width: 50px;">▶</button>
        <div id="time" style="font-size: 0.8rem; min-width: 80px;">0:00/0:00</div>
        <div style="flex:1; height: 6px; background: #334155; border-radius: 3px; overflow: hidden;">
            <div id="prog-fill" style="height: 100%; background: var(--accent); width: 0%;"></div>
        </div>
    </div>
</div>

<script>
    const log = (msg) => { document.getElementById('debug-log').innerText += "\n> " + msg; };
    const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';

    // A slightly larger but valid minimal SF2 (Base64)
    const MINIMAL_SF2 = "U0Zia2xpc3RUUksyAAAAAHRocmUAAAAAc2ZiayAgIGxpc3Q0YmFua2h0ZWRyAAD/AHNhbXBsAAAAAABpbnN0AAAAAABwcmVzAAAAAABnZW5zAAAAAABtb2RzAAAAAABzYW1wAAAAAABpbnN0AAAAAABwcmVzAAAAAA==";

    function getSf2BlobUrl() {
        const binary = window.atob(MINIMAL_SF2);
        const array = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
        const blob = new Blob([array], { type: 'application/x-font-sf2' });
        return URL.createObjectURL(blob);
    }

    document.getElementById('btn-start').addEventListener('click', async function() {
        this.style.display = 'none';
        log("Waking Audio...");

        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const actx = new AudioContext();
            await actx.resume();
            log("Audio: OK");

            // 1. Create a local URL for the SoundFont
            const localSf2Url = getSf2BlobUrl();
            log("Memory URL created.");

            // 2. Initialize AlphaTab
            log("Starting AlphaTab...");
            const element = document.getElementById('at-element');
            
            window.api = new alphaTab.AlphaTabApi(element, {
                core: { 
                    fontDirectory: CDN + 'font/',
                    useWorker: false 
                },
                player: {
                    enablePlayer: true,
                    enableBackingTracks: true,
                    soundFont: localSf2Url 
                }
            });

            // 3. Monitor for explicit loading errors
            window.api.error.on(err => log("API Error: " + err));

            window.api.playerReady.on(() => {
                log("Success! Launching UI...");
                document.getElementById('startup-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                setupEvents();
            });

            // If it hangs here, the CDN might be blocking the notation fonts (.woff)
            setTimeout(() => {
                if(document.getElementById('app').style.display !== 'flex') {
                    log("Stuck? Check your internet connection.");
                }
            }, 4000);

        } catch (e) {
            log("Catch: " + e.message);
        }
    });

    function setupEvents() {
        const fileInput = document.getElementById('file-input');
        const btnPlay = document.getElementById('btn-play');

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (args) => window.api.load(args.target.result);
            reader.readAsArrayBuffer(file);
        });

        btnPlay.addEventListener('click', () => {
            if (window.api.player?.synth?.audioContext?.state !== 'running') {
                window.api.player.synth.audioContext.resume();
            }
            if (window.api.player.backingTrackAudio) {
                window.api.player.backingTrackAudio.play().then(() => {
                    if(window.api.player.state !== 1) window.api.player.backingTrackAudio.pause();
                });
            }
            window.api.playPause();
        });

        window.api.scoreLoaded.on(score => {
            document.getElementById('song-info').innerText = score.title || 'Loaded';
        });

        window.api.playerStateChanged.on(e => {
            btnPlay.innerText = (e.state === 1) ? '⏸' : '▶';
        });

        window.api.playerPositionChanged.on(e => {
            const current = e.currentTime / 1000;
            const total = e.endTime / 1000;
            const fmt = (s) => Math.floor(s/60) + ":" + (Math.floor(s%60)).toString().padStart(2, '0');
            document.getElementById('time').innerText = `${fmt(current)}/${fmt(total)}`;
            document.getElementById('prog-fill').style.width = (e.currentTime / e.endTime * 100) + '%';
        });
    }
</script>
</body>
</html>
