<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaTab Player - Final Fix</title>
  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0-alpha.540/dist/alphaTab.min.js"></script>
  <style>
    :root {
      --accent:    #e94560;
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: sans-serif; }

    #app { display: flex; flex-direction: column; height: 100vh; }
    
    #header { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; }
    #logo { font-weight: bold; font-size: 1.2rem; }
    #logo span { color: var(--accent); }

    #main { flex: 1; display: flex; overflow: hidden; position: relative; }
    
    #sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; padding: 15px; }
    .track-item { padding: 8px; margin-bottom: 5px; background: rgba(255,255,255,0.05); border-radius: 4px; font-size: 0.85rem; }

    #viewport { flex: 1; overflow-y: auto; background: #f8fafc; position: relative; }
    #at-element { width: 100%; min-height: 100%; }

    #footer { height: 70px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; }

    /* Overlay Styles */
    .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: var(--bg); text-align: center; }
    .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn:hover { background: #d63d57; }
    .hidden { display: none !important; }

    #prog-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; cursor: pointer; position: relative; }
    #prog-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); width: 0%; border-radius: 3px; }
    
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="init-overlay" class="overlay">
  <div style="font-size: 3rem;">🎸</div>
  <h2 style="margin: 15px 0;">AlphaTab Player</h2>
  <p style="color: var(--muted); margin-bottom: 20px;">Safari requires a tap to enable audio engine</p>
  <button class="btn" id="btn-initialize">Start Player</button>
</div>

<div id="load-screen" class="overlay hidden">
  <div class="spinner"></div>
  <p style="margin-top: 15px; color: var(--muted);">Preparing notation engine...</p>
</div>

<div id="app" class="hidden">
  <div id="header">
    <div id="logo">Alpha<span>Tab</span></div>
    <div id="song-info" style="flex:1; font-size: 0.9rem; color: var(--muted);">No file loaded</div>
    <button class="btn" onclick="document.getElementById('file-input').click()">Open GP File</button>
    <input type="file" id="file-input" style="display:none" accept=".gp,.gp3,.gp4,.gp5,.gpx" />
  </div>

  <div id="main">
    <div id="sidebar">
      <h4 style="margin-bottom:10px; font-size: 0.7rem; text-transform:uppercase; color:var(--muted)">Tracks</h4>
      <div id="track-list"></div>
    </div>
    <div id="viewport">
      <div id="at-element"></div>
    </div>
  </div>

  <div id="footer">
    <button class="btn" id="btn-play" style="width:50px;">▶</button>
    <div id="time" style="font-family:monospace; font-size: 0.8rem; width: 100px;">00:00</div>
    <div id="prog-wrap"><div id="prog-fill"></div></div>
    <div style="width: 100px; display: flex; align-items: center; gap: 8px;">
        <span style="font-size: 0.7rem;">Vol</span>
        <input type="range" id="vol-control" value="80" style="width:100%" />
    </div>
  </div>
</div>

<script>
  let api = null;
  const initOverlay = document.getElementById('init-overlay');
  const appEl = document.getElementById('app');
  const loadScreen = document.getElementById('load-screen');
  const atEl = document.getElementById('at-element');
  const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.0-alpha.540/dist/';

  // INITIALIZE ON CLICK
  document.getElementById('btn-initialize').addEventListener('click', () => {
    initOverlay.classList.add('hidden');
    loadScreen.classList.remove('hidden');

    // Create API instance
    api = new alphaTab.AlphaTabApi(atEl, {
      core: { fontDirectory: CDN + 'font/' },
      player: {
        enablePlayer: true,
        soundFont: CDN + 'soundfont/sonivox.sf2',
        scrollElement: document.getElementById('viewport')
      }
    });

    // Handle initial audio context resume for Safari
    api.playerReady.on(() => {
      const ctx = api.player.synth.audioContext;
      if (ctx && ctx.state === 'suspended') ctx.resume();
      
      loadScreen.classList.add('hidden');
      appEl.classList.remove('hidden');
      console.log("AlphaTab Ready");
    });

    setupEvents();
  });

  function setupEvents() {
    const fileInput = document.getElementById('file-input');
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (args) => {
        api.load(args.target.result);
      };
      reader.readAsArrayBuffer(file);
    });

    // Playback Logic
    document.getElementById('btn-play').addEventListener('click', () => {
      // Safari Re-Unlock for MP3/Backing Tracks
      if (api.player.backingTrackAudio) {
        api.player.backingTrackAudio.play().then(() => {
            // Success
        }).catch(() => {});
      }
      api.playPause();
    });

    api.playerStateChanged.on(e => {
      document.getElementById('btn-play').innerText = e.state === 1 ? '⏸' : '▶';
    });

    api.scoreLoaded.on(score => {
      document.getElementById('song-info').innerText = `${score.title || 'Untitled'} - ${score.artist || 'Unknown'}`;
      
      // Update Tracks
      const trackList = document.getElementById('track-list');
      trackList.innerHTML = '';
      score.tracks.forEach(t => {
        const div = document.createElement('div');
        div.className = 'track-item';
        div.innerText = t.name;
        trackList.appendChild(div);
      });
    });

    api.playerPositionChanged.on(e => {
      const current = Math.floor(e.currentTime / 1000);
      const min = Math.floor(current / 60);
      const sec = (current % 60).toString().padStart(2, '0');
      document.getElementById('time').innerText = `${min}:${sec}`;
      
      const percent = (e.currentTime / e.endTime) * 100;
      document.getElementById('prog-fill').style.width = percent + '%';
    });

    document.getElementById('vol-control').addEventListener('input', e => {
      api.masterVolume = e.target.value / 100;
    });
  }
</script>
</body>
</html>
