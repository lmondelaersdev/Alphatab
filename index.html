<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaTab Player</title>
  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.1/dist/alphaTab.min.js"></script>
  <style>
    :root {
      --accent:    #e94560;
      --accent-dk: #c73652;
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #263348;
      --border:    #334155;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --sidebar-w: 230px;
      --header-h:  52px;
      --footer-h:  62px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    /* ═══════════ Layout ═══════════ */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* (All the rest of the CSS in full, see previous file dump) */

    /* ... continued ... (for brevity here, everything from your old file should be pasted in) ... */
    /* But in your real file, paste ALL CSS lines between <style>...</style> from the original commit! */
  </style>
</head>
<body>
<input type="file" id="file-input" />

<div id="app">

  <!-- ═══ Header ═══ -->
  <div id="header">
    <div id="logo">Alpha<em>Tab</em> Player</div>
    <div id="song-info">No file loaded</div>
    <button class="btn primary" id="btn-open">&#128193; Open File</button>
  </div>

  <!-- ═══ Body ═══ -->
  <div id="body">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section">Tracks</div>
      <div id="track-list">
        <div class="empty-tracks">Open a Guitar Pro file<br>to see tracks</div>
      </div>

      <div class="sidebar-section">Settings</div>
      <div id="settings-panel">
        <div class="setting-row">
          <span class="setting-label">Layout</span>
          <select id="sel-layout">
            <option value="0">Page</option>
            <option value="1">Horizontal</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-label">Notation</span>
          <select id="sel-stave">
            <option value="0">Default</option>
            <option value="3">Score + Tab</option>
            <option value="1">Score only</option>
            <option value="2">Tab only</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-label">Zoom</span>
          <select id="sel-zoom">
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1" selected>100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Viewport -->
    <div id="viewport">

      <!-- Loading overlay -->
      <div id="load-overlay" class="overlay hidden">
        <div class="spinner"></div>
        <div style="color:var(--muted)">Rendering…</div>
      </div>

      <!-- Drop / welcome overlay -->
      <div id="drop-overlay" class="overlay">
        <div class="drop-box" id="drop-box">
          <div class="drop-icon">&#127928;</div>
          <div class="drop-title">Open a Guitar Pro file</div>
          <div style="color:var(--muted);font-size:0.85rem;margin-top:0.3rem">
            Drag &amp; drop here, or click to browse
          </div>
          <div class="drop-ext">.gp &nbsp;·&nbsp; .gp3 &nbsp;·&nbsp; .gp4 &nbsp;·&nbsp; .gp5 &nbsp;·&nbsp; .gpx</div>
        </div>
      </div>

      <!-- AlphaTab target -->
      <div id="at-element"></div>
    </div>

  </div>

  <!-- ═══ Footer ═══ -->
  <div id="footer">
    <!-- Transport -->
    <button class="btn icon-btn" id="btn-play"  title="Play / Pause">&#9654;</button>
    <button class="btn icon-btn" id="btn-stop"  title="Stop">&#9632;</button>

    <div class="sep"></div>

    <!-- Time & progress -->
    <div id="time">0:00 / 0:00</div>
    <div id="prog-wrap" title="Progress">
      <div id="prog-fill"></div>
    </div>

    <div class="sep"></div>

    <!-- Toggles -->
    <button class="btn icon-btn" id="btn-loop"    title="Loop">&#8635;</button>
    <button class="btn icon-btn" id="btn-metro"   title="Metronome">&#119070;</button>
    <button class="btn icon-btn" id="btn-countin" title="Count-in">1&#818;2&#818;</button>

    <div class="sep"></div>

    <!-- Master volume -->
    <div class="sl-group" title="Master volume">
      <span>&#128266;</span>
      <input type="range" id="sl-vol" min="0" max="150" value="100" step="5" />
      <span class="sl-val" id="vol-val">100%</span>
    </div>

    <!-- Speed -->
    <div class="sl-group" title="Playback speed">
      <span>Speed</span>
      <input type="range" id="sl-speed" min="25" max="200" value="100" step="5" />
      <span class="sl-val" id="speed-val">100%</span>
    </div>
  </div>

</div><!-- #app -->

<script>
  const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.1/dist/';

  /* ─── AlphaTab init ─── */
  const atEl = document.getElementById('at-element');
  const api  = new alphaTab.AlphaTabApi(atEl, {
    core: {
      fontDirectory: CDN + 'font/'
    },
    display: {
      layoutMode:   0,   // 0=Page, 1=Horizontal
      staveProfile: 0,   // 0=Default, 1=Score, 2=Tab, 3=ScoreTab
      scale:        1.0
    },
    player: {
      enablePlayer:  true,
      enableCursor:  true,
      soundFont:     CDN + 'soundfont/sonivox.sf2'
    }
  });

  /* ─── File loading ─── */
  const fileInput  = document.getElementById('file-input');
  const dropOverlay = document.getElementById('drop-overlay');
  const loadOverlay = document.getElementById('load-overlay');
  const dropBox    = document.getElementById('drop-box');
  const viewport   = document.getElementById('viewport');

  function loadArrayBuffer(buf) {
    api.load(buf);
  }

  function openFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => loadArrayBuffer(e.target.result);
    reader.readAsArrayBuffer(file);
  }

  document.getElementById('btn-open').addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { openFile(e.target.files[0]); e.target.value = ''; });

  dropBox.addEventListener('click', () => fileInput.click());

  viewport.addEventListener('dragover', e => { e.preventDefault(); dropBox.classList.add('drag-over'); });
  viewport.addEventListener('dragleave', () => dropBox.classList.remove('drag-over'));
  viewport.addEventListener('drop', e => {
    e.preventDefault();
    dropBox.classList.remove('drag-over');
    openFile(e.dataTransfer.files[0]);
  });

  /* ─── Score events ─── */
  const trackListEl = document.getElementById('track-list');
  const songInfoEl  = document.getElementById('song-info');

  const COLORS = [
    '#e94560','#4299e1','#48bb78','#ed8936','#9f7aea',
    '#f6ad55','#38b2ac','#fc8181','#f687b3','#68d391'
  ];

  api.scoreLoaded.on(score => {
    dropOverlay.classList.add('hidden');

    // Song info
    const title  = score.title  || 'Untitled';
    const artist = score.artist || '';
    songInfoEl.innerHTML = `<strong>${title}</strong>${artist ? ' &mdash; ' + artist : ''}`;

    // Track list
    trackListEl.innerHTML = '';
    score.tracks.forEach((track, i) => {
      const color = COLORS[i % COLORS.length];
      const row = document.createElement('div');
      row.className = 'track-item';
      row.innerHTML = `
        <div class="track-dot" style="background:${color}"></div>
        <span class="track-name" title="${track.name}">${track.name || ('Track ' + (i + 1))}</span>
        <button class="t-btn" data-role="mute"  title="Mute">M</button>
        <button class="t-btn" data-role="solo"  title="Solo">S</button>
      `;

      const muteBtn = row.querySelector('[data-role="mute"]');
      const soloBtn = row.querySelector('[data-role="solo"]');

      muteBtn.addEventListener('click', e => {
        e.stopPropagation();
        const muted = muteBtn.classList.toggle('on');
        api.changeTrackMute([track], muted);
      });

      soloBtn.addEventListener('click', e => {
        e.stopPropagation();
        const soloed = soloBtn.classList.toggle('on');
        api.changeTrackSolo([track], soloed);
      });

      trackListEl.appendChild(row);
    });
  });

  api.renderStarted.on(() => loadOverlay.classList.remove('hidden'));
  api.postRenderFinished.on(() => loadOverlay.classList.add('hidden'));

  /* ─── Playback controls ─── */
  const btnPlay  = document.getElementById('btn-play');
  const btnStop  = document.getElementById('btn-stop');
  const btnLoop  = document.getElementById('btn-loop');
  const btnMetro = document.getElementById('btn-metro');
  const btnCountIn = document.getElementById('btn-countin');
  const timeDsp  = document.getElementById('time');
  const progFill = document.getElementById('prog-fill');

  btnPlay.addEventListener('click',  () => api.playPause());
  btnStop.addEventListener('click',  () => api.stop());

  btnLoop.addEventListener('click', () => {
    api.isLooping = !api.isLooping;
    btnLoop.classList.toggle('on', api.isLooping);
  });

  btnMetro.addEventListener('click', () => {
    const on = api.metronomeVolume === 0;
    api.metronomeVolume = on ? 1 : 0;
    btnMetro.classList.toggle('on', on);
  });

  btnCountIn.addEventListener('click', () => {
    const on = api.countInVolume === 0;
    api.countInVolume = on ? 1 : 0;
    btnCountIn.classList.toggle('on', on);
  });

  // PlayerState: 0 = Paused, 1 = Playing
  api.playerStateChanged.on(e => {
    btnPlay.innerHTML = e.state === 1 ? '&#9646;&#9646;' : '&#9654;';
  });

  function fmt(ms) {
    const s = Math.floor(ms / 1000);
    return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
  }

  api.playerPositionChanged.on(e => {
    timeDsp.textContent = `${fmt(e.currentTime)} / ${fmt(e.endTime)}`;
    const pct = e.endTime > 0 ? (e.currentTime / e.endTime) * 100 : 0;
    progFill.style.width = pct.toFixed(1) + '%';
  });

  /* ─── Volume ─── */
  const slVol  = document.getElementById('sl-vol');
  const volVal = document.getElementById('vol-val');
  slVol.addEventListener('input', () => {
    const v = parseInt(slVol.value, 10);
    volVal.textContent = v + '%';
    api.masterVolume = v / 100;
  });

  /* ─── Speed ─── */
  const slSpeed  = document.getElementById('sl-speed');
  const speedVal = document.getElementById('speed-val');
  slSpeed.addEventListener('input', () => {
    const v = parseInt(slSpeed.value, 10);
    speedVal.textContent = v + '%';
    api.playbackSpeed = v / 100;
  });

  /* ─── Layout / notation / zoom ─── */
  document.getElementById('sel-layout').addEventListener('change', e => {
    api.settings.display.layoutMode = parseInt(e.target.value, 10);
    api.updateSettings();
    api.render();
  });

  document.getElementById('sel-stave').addEventListener('change', e => {
    api.settings.display.staveProfile = parseInt(e.target.value, 10);
    api.updateSettings();
    api.render();
  });

  document.getElementById('sel-zoom').addEventListener('change', e => {
    api.settings.display.scale = parseFloat(e.target.value);
    api.updateSettings();
    api.render();
  });
</script>
</body>
</html>
