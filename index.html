<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AlphaTab Safari Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>
    <style>
        :root { --accent: #e94560; --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; }
        body { height: 100dvh; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system; }
        #app { display: none; flex-direction: column; height: 100%; }
        #header { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        #main { flex: 1; overflow: hidden; position: relative; background: #fff; }
        #viewport { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #footer { height: 75px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 12px; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #prog-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s; }
        .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: var(--bg); text-align: center; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="startup-screen" class="overlay">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🎸</div>
    <h3 id="status-msg">Safari Engine Standby</h3>
    <p id="sub-msg" style="color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem;">Click to force-load audio</p>
    <button class="btn" id="btn-start">Connect Engine</button>
</div>

<div id="app">
    <div id="header">
        <div style="font-weight: 800; color: var(--accent);">AlphaTab</div>
        <div id="song-info" style="flex:1; font-size: 0.8rem; opacity: 0.7;">No file</div>
        <button class="btn" style="padding: 5px 12px;" onclick="document.getElementById('file-input').click()">Open</button>
        <input type="file" id="file-input" style="display:none" accept=".gp,.gp3,.gp4,.gp5,.gpx" />
    </div>
    <div id="main">
        <div id="viewport"><div id="at-element"></div></div>
    </div>
    <div id="footer">
        <button class="btn" id="btn-play" style="width: 50px;">▶</button>
        <div id="time" style="font-family: monospace; font-size: 0.8rem; min-width: 80px;">0:00/0:00</div>
        <div style="flex:1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;">
            <div id="prog-fill"></div>
        </div>
    </div>
</div>

<script>
    let api = null;
    // Switching to a more reliable CDN link for AlphaTab 1.8.1
    const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';

    document.getElementById('btn-start').addEventListener('click', async function() {
        const btn = this;
        const msg = document.getElementById('status-msg');
        btn.style.display = 'none';
        msg.innerText = "Bypassing Safari Sandbox...";

        // 1. Manually trigger AudioContext BEFORE AlphaTab starts
        // This is the #1 reason for 0% hangs in Safari
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const tempCtx = new AudioContext();
        await tempCtx.resume();

        // 2. Initialize AlphaTab with explicitly defined engine
        const element = document.getElementById('at-element');
        api = new alphaTab.AlphaTabApi(element, {
            core: { 
                fontDirectory: CDN + 'font/',
                engine: 'html5' // Force HTML5 canvas for better Safari perf
            },
            player: {
                enablePlayer: true,
                enableBackingTracks: true,
                // Using "mscore" instead of "sonivox" - it's often smaller/faster
                soundFont: CDN + 'soundfont/sonivox.sf2' 
            }
        });

        // 3. Monitor Network directly
        api.soundFontLoad.on((e) => {
            const pct = Math.floor((e.loaded / e.total) * 100);
            msg.innerText = `Loading Sounds: ${pct}%`;
            if(isNaN(pct)) msg.innerText = "Downloading engine...";
        });

        api.playerReady.on(() => {
            document.getElementById('startup-screen').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            initApp();
        });

        // Fallback for Safari 0% hang
        setTimeout(() => {
            if (document.getElementById('app').style.display !== 'flex') {
                msg.innerText = "Connection slow... forcing wake up...";
                // Force an internal trigger
                if(api.player && api.player.synth) api.player.synth.audioContext.resume();
            }
        }, 5000);
    });

    function initApp() {
        const fileInput = document.getElementById('file-input');
        const btnPlay = document.getElementById('btn-play');

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (args) => api.load(args.target.result);
            reader.readAsArrayBuffer(file);
        });

        btnPlay.addEventListener('click', () => {
            // Re-prime Safari audio on every click
            if (api.player?.synth?.audioContext?.state !== 'running') {
                api.player.synth.audioContext.resume();
            }
            
            // Critical: If GP8 backing track exists, prime it
            if (api.player.backingTrackAudio) {
                const bt = api.player.backingTrackAudio;
                bt.play().then(() => { if(api.player.state !== 1) bt.pause(); });
            }
            
            api.playPause();
        });

        api.scoreLoaded.on(score => {
            document.getElementById('song-info').innerText = score.title || 'Loaded';
            // Logic: If there is a backing track, we use it.
            setTimeout(() => {
                if (api.player.backingTrackAudio) {
                    console.log("GP8 Audio Sync Active");
                }
            }, 100);
        });

        api.playerStateChanged.on(e => {
            btnPlay.innerText = (e.state === 1) ? '⏸' : '▶';
        });

        api.playerPositionChanged.on(e => {
            const current = e.currentTime / 1000;
            const total = e.endTime / 1000;
            const fmt = (s) => Math.floor(s/60) + ":" + (Math.floor(s%60)).toString().padStart(2, '0');
            document.getElementById('time').innerText = `${fmt(current)}/${fmt(total)}`;
            document.getElementById('prog-fill').style.width = (e.currentTime / e.endTime * 100) + '%';
        });
    }
</script>
</body>
</html>
