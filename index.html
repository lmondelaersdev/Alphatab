<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>AlphaTab 1.8.1 - Safari Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/alphaTab.min.js"></script>
  <style>
    :root { --accent: #e94560; --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; }
    body { height: 100dvh; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system; }
    #app { display: none; flex-direction: column; height: 100%; }
    #header { height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 10px; }
    #main { flex: 1; overflow: hidden; position: relative; background: #fff; }
    #viewport { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    #footer { height: 75px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 12px; }
    .btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #prog-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; position: relative; }
    #prog-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); width: 0%; border-radius: 3px; transition: width 0.1s linear; }
    .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; background: var(--bg); text-align: center; padding: 30px; }
    .spinner { width: 35px; height: 35px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="startup-screen" class="overlay">
    <div style="font-size: 3.5rem; margin-bottom: 1rem;">🎸</div>
    <h2 style="margin-bottom: 8px;">AlphaTab Player</h2>
    <p id="startup-status" style="color: var(--muted); margin-bottom: 25px;">
        Tap to load the audio engine.
    </p>
    <div id="dl-progress-container" class="hidden" style="width: 200px; margin-bottom: 20px;">
        <div id="prog-wrap"><div id="dl-fill" style="background: var(--accent); height: 6px; width: 0%; border-radius: 3px;"></div></div>
        <div id="dl-text" style="font-size: 10px; margin-top: 5px;">0%</div>
    </div>
    <button class="btn" id="btn-start">Start Player</button>
</div>

<div id="app">
    <div id="header">
        <div style="font-weight: 800; color: var(--accent);">AlphaTab</div>
        <div id="song-info" style="flex:1; font-size: 0.85rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">No file loaded</div>
        <button class="btn" style="padding: 7px 12px; font-size: 0.8rem;" onclick="document.getElementById('file-input').click()">Open</button>
        <input type="file" id="file-input" style="display:none" accept=".gp,.gp3,.gp4,.gp5,.gpx" />
    </div>
    <div id="main">
        <div id="load-layer" class="overlay hidden" style="background: rgba(15,23,42,0.8);"><div class="spinner"></div><p>Processing Score...</p></div>
        <div id="viewport"><div id="at-element"></div></div>
    </div>
    <div id="footer">
        <button class="btn" id="btn-play" style="width: 45px; padding: 0;">▶</button>
        <div id="time" style="font-family: monospace; font-size: 0.8rem; min-width: 85px;">0:00/0:00</div>
        <div id="prog-wrap"><div id="prog-fill"></div></div>
    </div>
</div>

<script>
    let api = null;
    const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.8.1/dist/';
    
    const startBtn = document.getElementById('btn-start');
    const statusText = document.getElementById('startup-status');
    const dlContainer = document.getElementById('dl-progress-container');
    const dlFill = document.getElementById('dl-fill');
    const dlText = document.getElementById('dl-text');

    startBtn.addEventListener('click', function() {
        startBtn.disabled = true;
        statusText.innerText = "Downloading Engine...";
        dlContainer.classList.remove('hidden');

        const element = document.getElementById('at-element');
        
        // 1. Initialize API
        api = new alphaTab.AlphaTabApi(element, {
            core: { fontDirectory: CDN + 'font/' },
            player: {
                enablePlayer: true,
                enableBackingTracks: true, // Crucial for GP8
                playerMode: 1,             // 1 = Automatic (prefers Backing Track if exists)
                soundFont: CDN + 'soundfont/sonivox.sf2'
            }
        });

        // 2. Track Progress (Prevents "stuck" feeling)
        api.soundFontLoad.on((e) => {
            const pct = Math.floor((e.loaded / e.total) * 100);
            dlFill.style.width = pct + '%';
            dlText.innerText = `Loading Sounds: ${pct}%`;
        });

        // 3. Error Handling
        api.error.on((err) => {
            statusText.innerText = "Error: " + err.message;
            startBtn.disabled = false;
        });

        // 4. Handle Readiness
        api.playerReady.on(() => {
            // "Bless" the audio context immediately
            const ctx = api.player?.synth?.audioContext;
            if (ctx) ctx.resume();

            document.getElementById('startup-screen').classList.add('hidden');
            document.getElementById('app').style.display = 'flex';
            setupInteraction();
        });
    });

    function setupInteraction() {
        const fileInput = document.getElementById('file-input');
        const btnPlay = document.getElementById('btn-play');

        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('load-layer').classList.remove('hidden');
            const reader = new FileReader();
            reader.onload = (args) => api.load(args.target.result);
            reader.readAsArrayBuffer(file);
        });

        btnPlay.addEventListener('click', () => {
            // Safari: Always try to resume context on every play click
            if (api.player?.synth?.audioContext?.state !== 'running') {
                api.player.synth.audioContext.resume();
            }
            
            // Sync Backing Track Audio (GP8)
            if (api.player.backingTrackAudio) {
                const bt = api.player.backingTrackAudio;
                if (bt.paused) {
                    bt.play().then(() => {
                        if (api.player.state !== 1) bt.pause(); // Just priming
                    }).catch(() => {});
                }
            }

            api.playPause();
        });

        api.scoreLoaded.on(score => {
            document.getElementById('song-info').innerText = score.title || 'Untitled';
            document.getElementById('load-layer').classList.add('hidden');
            
            // If you ONLY want backing track and no MIDI sounds:
            setTimeout(() => {
                if (api.player.backingTrackAudio) {
                    console.log("Backing track found. Using high-quality audio.");
                    // Optional: api.player.synth.isMuted = true; 
                }
            }, 200);
        });

        api.playerStateChanged.on(e => {
            btnPlay.innerText = (e.state === 1) ? '⏸' : '▶';
        });

        api.playerPositionChanged.on(e => {
            const current = e.currentTime / 1000;
            const total = e.endTime / 1000;
            const fmt = (s) => Math.floor(s/60) + ":" + (Math.floor(s%60 || 0)).toString().padStart(2, '0');
            document.getElementById('time').innerText = `${fmt(current)}/${fmt(total)}`;
            document.getElementById('prog-fill').style.width = (e.currentTime / e.endTime * 100) + '%';
        });

        api.renderStarted.on(() => document.getElementById('load-layer').classList.remove('hidden'));
        api.postRenderFinished.on(() => document.getElementById('load-layer').classList.add('hidden'));
    }
</script>
</body>
</html>
