<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaTab Player</title>
  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.1/dist/alphaTab.min.js"></script>
  <style>
    :root {
      --accent:    #e94560;
      --accent-dk: #c73652;
      --bg:        #0f172a;
      --surface:   #1e293b;
      --surface2:  #263348;
      --border:    #334155;
      --text:      #e2e8f0;
      --muted:     #94a3b8;
      --sidebar-w: 230px;
      --header-h:  52px;
      --footer-h:  62px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }

    /* ═══════════ Layout ═══════════ */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ═══════════ Header ═══════════ */
    #header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    #logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-right: 0.5rem;
    }
    #logo em { color: var(--accent); font-style: normal; }

    #song-info {
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      color: var(--muted);
      font-size: 0.82rem;
      padding: 0 0.5rem;
    }
    #song-info strong { color: var(--text); }

    /* ═══════════ Body ═══════════ */
    #body { display: flex; flex: 1; overflow: hidden; }

    /* ═══════════ Sidebar ═══════════ */
    #sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .sidebar-section {
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    #track-list { flex: 1; overflow-y: auto; padding: 0.25rem 0; }

    .track-item {
      display: flex;
      align-items: center;
      padding: 0.45rem 0.75rem;
      gap: 0.5rem;
      border-radius: 5px;
      margin: 1px 0.3rem;
      cursor: default;
    }

    .track-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .track-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.82rem;
    }

    .t-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      font-size: 0.6rem;
      font-weight: 700;
      width: 18px; height: 18px;
      line-height: 1;
      cursor: pointer;
      transition: all 0.12s;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .t-btn:hover { border-color: var(--accent); color: var(--accent); }
    .t-btn.on   { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Settings section */
    #settings-panel { padding: 0.6rem 0.75rem; display: flex; flex-direction: column; gap: 0.55rem; }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .setting-label { color: var(--muted); font-size: 0.78rem; }

    select, .sel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 0.2rem 0.4rem;
      font-size: 0.78rem;
      cursor: pointer;
      height: 26px;
    }
    select option { background: #1e293b; }

    /* ═══════════ Viewport ═══════════ */
    #viewport {
      flex: 1;
      overflow: auto;
      background: #d1d5db;
      position: relative;
    }

    #at-element { background: #fff; }

    /* ═══════════ Overlays ═══════════ */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    #drop-overlay { background: rgba(15,23,42,0.94); }
    #drop-overlay.hidden { display: none; }

    #load-overlay { background: rgba(15,23,42,0.78); }
    #load-overlay.hidden { display: none; }

    .drop-box {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 3rem 3.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-box:hover, .drop-box.drag-over {
      border-color: var(--accent);
      background: rgba(233,69,96,0.08);
    }

    .drop-icon { font-size: 3.5rem; margin-bottom: 1rem; opacity: 0.6; }
    .drop-title { font-size: 1.2rem; font-weight: 600; color: #fff; margin-bottom: 0.4rem; }
    .drop-ext { color: var(--muted); font-size: 0.83rem; margin-top: 0.5rem; }

    .spinner {
      width: 38px; height: 38px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      margin-bottom: 0.75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════ Footer ═══════════ */
    #footer {
      height: var(--footer-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.55rem;
      flex-shrink: 0;
    }

    /* ═══════════ Shared controls ═══════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .btn:hover { border-color: #64748b; background: #314060; }
    .btn.on    { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.on:hover { background: var(--accent-dk); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; padding: 0 0.9rem; height: 30px; }
    .btn.primary:hover { background: var(--accent-dk); }

    .icon-btn { width: 34px; height: 34px; font-size: 1rem; }

    .sep { width: 1px; height: 26px; background: var(--border); flex-shrink: 0; }

    /* Progress */
    #time { font-family: monospace; font-size: 0.82rem; color: var(--muted); min-width: 10ch; text-align: center; }

    #prog-wrap {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      position: relative;
      cursor: pointer;
      min-width: 60px;
    }
    #prog-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      pointer-events: none;
      transition: width 0.08s linear;
    }

    /* Sliders */
    .sl-group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .sl-group input[type=range] { accent-color: var(--accent); width: 72px; cursor: pointer; }
    .sl-val { min-width: 3.2ch; color: var(--text); font-weight: 600; text-align: right; }

    #file-input { display: none; }

    .empty-tracks {
      padding: 1rem 0.75rem;
      color: var(--muted);
      font-size: 0.78rem;
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<input type="file" id="file-input" />

<div id="app">

  <!-- ═══ Header ═══ -->
  <div id="header">
    <div id="logo">Alpha<em>Tab</em> Player</div>
    <div id="song-info">No file loaded</div>
    <button class="btn primary" id="btn-open">&#128193; Open File</button>
  </div>

  <!-- ═══ Body ═══ -->
  <div id="body">

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-section">Tracks</div>
      <div id="track-list">
        <div class="empty-tracks">Open a Guitar Pro file<br>to see tracks</div>
      </div>

      <div class="sidebar-section">Settings</div>
      <div id="settings-panel">
        <div class="setting-row">
          <span class="setting-label">Layout</span>
          <select id="sel-layout">
            <option value="0">Page</option>
            <option value="1">Horizontal</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-label">Notation</span>
          <select id="sel-stave">
            <option value="0">Default</option>
            <option value="3">Score + Tab</option>
            <option value="1">Score only</option>
            <option value="2">Tab only</option>
          </select>
        </div>
        <div class="setting-row">
          <span class="setting-label">Zoom</span>
          <select id="sel-zoom">
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1" selected>100%</option>
            <option value="1.25">125%</option>
            <option value="1.5">150%</option>
            <option value="2">200%</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Viewport -->
    <div id="viewport">

      <!-- Loading overlay -->
      <div id="load-overlay" class="overlay hidden">
        <div class="spinner"></div>
        <div style="color:var(--muted)">Rendering…</div>
      </div>

      <!-- Drop / welcome overlay -->
      <div id="drop-overlay" class="overlay">
        <div class="drop-box" id="drop-box">
          <div class="drop-icon">&#127928;</div>
          <div class="drop-title">Open a Guitar Pro file</div>
          <div style="color:var(--muted);font-size:0.85rem;margin-top:0.3rem">
            Drag &amp; drop here, or click to browse
          </div>
          <div class="drop-ext">.gp &nbsp;·&nbsp; .gp3 &nbsp;·&nbsp; .gp4 &nbsp;·&nbsp; .gp5 &nbsp;·&nbsp; .gpx</div>
        </div>
      </div>

      <!-- AlphaTab target -->
      <div id="at-element"></div>
    </div>

  </div>

  <!-- ═══ Footer ═══════════ -->
  <div id="footer">
    <!-- Transport -->
    <button class="btn icon-btn" id="btn-play"  title="Play / Pause">&#9654;</button>
    <button class="btn icon-btn" id="btn-stop"  title="Stop">&#9632;</button>

    <div class="sep"></div>

    <!-- Time & progress -->
    <div id="time">0:00 / 0:00</div>
    <div id="prog-wrap" title="Progress">
      <div id="prog-fill"></div>
    </div>

    <div class="sep"></div>

    <!-- Toggles -->
    <button class="btn icon-btn" id="btn-loop"    title="Loop">&#8635;</button>
    <button class="btn icon-btn" id="btn-metro"   title="Metronome">&#119070;</button>
    <button class="btn icon-btn" id="btn-countin" title="Count-in">1&#818;2&#818;</button>

    <div class="sep"></div>

    <!-- Master volume -->
    <div class="sl-group" title="Master volume">
      <span>&#128266;</span>
      <input type="range" id="sl-vol" min="0" max="150" value="100" step="5" />
      <span class="sl-val" id="vol-val">100%</span>
    </div>

    <!-- Speed -->
    <div class="sl-group" title="Playback speed">
      <span>Speed</span>
      <input type="range" id="sl-speed" min="25" max="200" value="100" step="5" />
      <span class="sl-val" id="speed-val">100%</span>
    </div>
  </div>

</div><!-- #app -->

<script>
  const CDN = 'https://cdn.jsdelivr.net/npm/@coderline/alphatab@1.3.1/dist/';
  // ... all the JavaScript from commit 5bf450c ...
</script>
</body>
</html>
